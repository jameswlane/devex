checksum:
  name_template: checksums.txt
signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - ${signature}
      - "--detach-sign"
      - ${artifact}
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
  groups:
    - title: New Features
      regexp: ^.*?feat(\([[:word:]]+\))??!?:.+$
      order: 0
    - title: Bug Fixes
      regexp: ^.*?fix(\([[:word:]]+\))??!?:.+$
      order: 1
    - title: Plugin Updates
      regexp: ^.*?plugin(\([[:word:]]+\))??!?:.+$
      order: 2
    - title: Others
      order: 999
release:
  github:
    owner: jameswlane
    name: devex
  name_template: DevEx v{{ .Version }}
  mode: replace
  draft: false
  prerelease: auto
after:
  hooks:
    - cmd: node scripts/generate-registry.js {{ .Version }}
      env:
        - GITHUB_TOKEN={{ .Env.GITHUB_TOKEN }}
brews:
  - name: devex
    ids:
      - main-archive
    repository:
      owner: jameswlane
      name: homebrew-devex
    folder: Formula
    homepage: https://devex.sh
    description: CLI tool for efficiently setting up and managing development environments
    license: GPL-3.0
snapcrafts:
  - id: devex-snap
    builds:
      - devex-cli
    name: devex
    summary: Development environment management CLI
    description: |
      DevEx is a powerful CLI tool designed to streamline the setup and management
      of development environments. It simplifies the installation of applications,
      configuration of programming languages, and customization of themes.
    grade: stable
    confinement: classic
    license: GPL-3.0
scoops:
  - name: devex
    ids:
      - main-archive
    repository:
      owner: jameswlane
      name: scoop-devex
    folder: bucket
    homepage: https://devex.sh
    description: CLI tool for efficiently setting up and managing development environments
    license: GPL-3.0
