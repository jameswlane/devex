# .goreleaser.yml
version: 2
project_name: devex
# Build configuration for main CLI
builds:
  # Main DevEx CLI
  - id: devex-cli
    main: ./apps/cli
    binary: devex
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
  # Package Manager Plugins
  - id: plugin-apt
    main: ./packages/plugins/package-manager-apt
    binary: devex-plugin-package-manager-apt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
  - id: plugin-yum
    main: ./packages/plugins/package-manager-yum
    binary: devex-plugin-package-manager-yum
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
  - id: plugin-pacman
    main: ./packages/plugins/package-manager-pacman
    binary: devex-plugin-package-manager-pacman
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
  - id: plugin-brew
    main: ./packages/plugins/package-manager-brew
    binary: devex-plugin-package-manager-brew
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
  - id: plugin-choco
    main: ./packages/plugins/package-manager-choco
    binary: devex-plugin-package-manager-choco
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
  - id: plugin-winget
    main: ./packages/plugins/package-manager-winget
    binary: devex-plugin-package-manager-winget
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
# Archive configuration
archives:
  - id: main-archive
    builds:
      - devex-cli
    name_template: "devex_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
  # Plugin archives - separate archive per plugin
  - id: plugin-apt-archive
    builds:
      - plugin-apt
    name_template: "devex-plugin-package-manager-apt_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
  - id: plugin-yum-archive
    builds:
      - plugin-yum
    name_template: "devex-plugin-package-manager-yum_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
  - id: plugin-pacman-archive
    builds:
      - plugin-pacman
    name_template: "devex-plugin-package-manager-pacman_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
  - id: plugin-brew-archive
    builds:
      - plugin-brew
    name_template: "devex-plugin-package-manager-brew_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
  - id: plugin-choco-archive
    builds:
      - plugin-choco
    name_template: "devex-plugin-package-manager-choco_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: zip
  - id: plugin-winget-archive
    builds:
      - plugin-winget
    name_template: "devex-plugin-package-manager-winget_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: zip
# Checksum
checksum:
  name_template: 'checksums.txt'
# Changelog
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
  groups:
    - title: 'New Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Plugin Updates'
      regexp: '^.*?plugin(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: 'Others'
      order: 999
# GitHub Release
release:
  github:
    owner: jameswlane
    name: devex
  name_template: "DevEx v{{ .Version }}"
  mode: replace
  draft: false
  prerelease: auto
# Custom hooks to generate registry
after:
  hooks:
    - cmd: node scripts/generate-registry.js {{ .Version }}
      env:
        - GITHUB_TOKEN={{ .Env.GITHUB_TOKEN }}
# Homebrew
brews:
  - name: devex
    ids:
      - main-archive
    repository:
      owner: jameswlane
      name: homebrew-devex
    folder: Formula
    homepage: https://devex.sh
    description: "CLI tool for efficiently setting up and managing development environments"
    license: GPL-3.0
# Snapcraft
snapcrafts:
  - id: devex-snap
    builds:
      - devex-cli
    name: devex
    summary: Development environment management CLI
    description: |
      DevEx is a powerful CLI tool designed to streamline the setup and management
      of development environments. It simplifies the installation of applications,
      configuration of programming languages, and customization of themes.
    grade: stable
    confinement: classic
    license: GPL-3.0
# Scoop (Windows)
scoops:
  - name: devex
    ids:
      - main-archive
    repository:
      owner: jameswlane
      name: scoop-devex
    folder: bucket
    homepage: https://devex.sh
    description: "CLI tool for efficiently setting up and managing development environments"
    license: GPL-3.0
