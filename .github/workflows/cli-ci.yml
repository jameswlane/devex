name: CLI Build, Lint, and Test
on:
  push:
    branches:
      - main
    paths:
      - 'apps/cli/**'
      - '.github/workflows/cli-ci.yml'
  pull_request:
    paths:
      - 'apps/cli/**'
      - '.github/workflows/cli-ci.yml'
permissions:
  contents: read
jobs:
  # Build, lint, and test CLI with Turborepo
  cli-test:
    runs-on: ubuntu-latest
    # env:
    # Add Turborepo Remote Caching if needed
    # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    # TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Cache Turborepo builds
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.15.1
          run_install: false
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Install global tools
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0
      - name: Build all packages
        run: pnpm build
      - name: Lint all packages
        run: pnpm turbo lint --concurrency=1
      - name: Test all packages
        run: pnpm test
  # Build web apps
  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.15.1
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build web app
        run: pnpm turbo run build --filter=web
      - name: Build docs
        run: pnpm turbo run build --filter=docs
