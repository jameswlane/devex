name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Create Tags
        id: changesets
        uses: changesets/action@v1
        with:
          title: "🚀 Release"
          commit: "chore: version packages"
          version: pnpm changeset:version
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git tags for GoReleaser
        if: steps.changesets.outputs.published == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Published packages:"
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq '.'

          # Create tags for GoReleaser
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')

            case "$NAME" in
              "@devex/cli")
                TAG="v$VERSION"
                echo "Creating CLI tag: $TAG"
                git tag -a "$TAG" -m "Release DevEx CLI $VERSION"
                git push origin "$TAG"
                ;;
              "@devex/plugin-sdk")
                TAG="plugin-sdk/v$VERSION"
                echo "Creating Plugin SDK tag: $TAG"
                git tag -a "$TAG" -m "Release Plugin SDK $VERSION"
                git push origin "$TAG"
                ;;
              @devex/plugin-*)
                PLUGIN_NAME=$(echo "$NAME" | sed 's/@devex\/plugin-//')
                TAG="plugin-${PLUGIN_NAME}-v${VERSION}"
                echo "Creating plugin tag: $TAG"
                git tag -a "$TAG" -m "Release $PLUGIN_NAME plugin $VERSION"
                git push origin "$TAG"
                ;;
            esac
          done

          echo "🎉 All tags created! GoReleaser workflows will be triggered automatically."
