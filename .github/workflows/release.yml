name: Release
on:
  push:
    branches:
      - main
concurrency: ${{ github.workflow }}-${{ github.ref }}
permissions:
  contents: write
  pull-requests: write
  packages: write
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Determine changed packages and create releases
        id: auto-release
        run: |
          # Install dependencies first
          pnpm install --frozen-lockfile

          # Set up git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get the last tag or use initial commit
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Last tag: $LAST_TAG"

          # Check what files changed since last tag
          CHANGED_FILES=$(git diff --name-only $LAST_TAG..HEAD || git diff --name-only --cached)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Check for conventional commits since last tag
          COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"%s" --no-merges | grep -E "^(feat|fix|perf|refactor)(\([^)]+\))?: " || echo "")

          if [ -z "$COMMITS" ]; then
            echo "No conventional commits found since last release"
            echo "has_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found conventional commits:"
          echo "$COMMITS"

          # Determine version bump (major, minor, patch)
          BUMP_TYPE="patch"
          if echo "$COMMITS" | grep -q "BREAKING CHANGE\|!:"; then
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -q "^feat"; then
            BUMP_TYPE="minor"
          fi

          echo "Determined bump type: $BUMP_TYPE"

          # Determine affected packages based on changed files (more precise detection)
          PACKAGES_TO_RELEASE=""

          # Filter out changes that shouldn't trigger releases
          RELEVANT_CHANGED_FILES=$(echo "$CHANGED_FILES" | grep -v "^\.github/" | grep -v "^apps/registry/" | grep -v "^apps/web/" | grep -v "^apps/docs/" | grep -v "^scripts/" | grep -v "^\..*" | grep -v "README\.md$" | grep -v "\.md$" | grep -v "package\.json$" || echo "")

          echo "Relevant changed files (excluding workflows, registry, docs):"
          echo "$RELEVANT_CHANGED_FILES"

          # Check CLI changes (exclude docs and README files)
          CLI_CHANGED_FILES=$(echo "$RELEVANT_CHANGED_FILES" | grep "^apps/cli/" | grep -v "^apps/cli/docs/" | grep -v "^apps/cli/README.md" | grep -v "^apps/cli/\.md$" || echo "")
          if [ -n "$CLI_CHANGED_FILES" ]; then
            echo "CLI source code changes detected:"
            echo "$CLI_CHANGED_FILES"
            PACKAGES_TO_RELEASE="$PACKAGES_TO_RELEASE @devex/cli"
          fi

          # Check Plugin SDK changes (exclude docs and README files)
          SDK_CHANGED_FILES=$(echo "$RELEVANT_CHANGED_FILES" | grep "^packages/plugin-sdk/" | grep -v "^packages/plugin-sdk/docs/" | grep -v "^packages/plugin-sdk/README.md" | grep -v "^packages/plugin-sdk/\.md$" || echo "")
          if [ -n "$SDK_CHANGED_FILES" ]; then
            echo "Plugin SDK source code changes detected:"
            echo "$SDK_CHANGED_FILES"
            PACKAGES_TO_RELEASE="$PACKAGES_TO_RELEASE @devex/plugin-sdk"
          fi

          # Check individual plugin package changes (only source code changes)
          for dir in packages/*/; do
            if [ "$dir" != "packages/plugin-sdk/" ]; then
              PACKAGE_NAME=$(basename "$dir")
              # Only include source code changes, exclude docs/README/markdown files
              PLUGIN_CHANGED_FILES=$(echo "$RELEVANT_CHANGED_FILES" | grep "^$dir" | grep -v "^$dir/docs/" | grep -v "^$dir/README.md" | grep -v "^$dir.*\.md$" || echo "")
              if [ -n "$PLUGIN_CHANGED_FILES" ]; then
                echo "Plugin $PACKAGE_NAME source code changes detected:"
                echo "$PLUGIN_CHANGED_FILES"
                PACKAGES_TO_RELEASE="$PACKAGES_TO_RELEASE @devex/$PACKAGE_NAME"
              fi
            fi
          done

          PACKAGES_TO_RELEASE=$(echo "$PACKAGES_TO_RELEASE" | xargs)
          echo "Packages to release: $PACKAGES_TO_RELEASE"

          if [ -z "$PACKAGES_TO_RELEASE" ]; then
            echo "No packages affected by source code changes (excluding docs/README changes)"
            echo "has_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_release=true" >> $GITHUB_OUTPUT
          echo "packages=$PACKAGES_TO_RELEASE" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
      - name: Calculate versions and prepare release data
        if: steps.auto-release.outputs.has_release == 'true'
        id: prepare-releases
        run: "PACKAGES=\"${{ steps.auto-release.outputs.packages }}\"\nBUMP_TYPE=\"${{ steps.auto-release.outputs.bump_type }}\"\n\n# Prepare release data\nRELEASE_DATA=\"\"\n\nfor PACKAGE in $PACKAGES; do\n  echo \"Processing package: $PACKAGE\"\n  \n  # Get current version from package.json if it exists\n  CURRENT_VERSION=\"0.0.0\"\n  case \"$PACKAGE\" in\n    \"@devex/cli\")\n      if [ -f \"apps/cli/package.json\" ]; then\n        CURRENT_VERSION=$(jq -r '.version // \"0.0.0\"' apps/cli/package.json)\n      fi\n      ;;\n    \"@devex/plugin-sdk\")\n      if [ -f \"packages/plugin-sdk/package.json\" ]; then\n        CURRENT_VERSION=$(jq -r '.version // \"0.0.0\"' packages/plugin-sdk/package.json)\n      fi\n      ;;\n    @devex/*)\n      PACKAGE_DIR=\"packages/$(echo \"$PACKAGE\" | sed 's/@devex\\///')\"\n      if [ -f \"$PACKAGE_DIR/package.json\" ]; then\n        CURRENT_VERSION=$(jq -r '.version // \"0.0.0\"' \"$PACKAGE_DIR/package.json\")\n      fi\n      ;;\n  esac\n  \n  # Calculate new version\n  IFS='.' read -r major minor patch <<< \"$CURRENT_VERSION\"\n  case \"$BUMP_TYPE\" in\n    \"major\")\n      NEW_VERSION=\"$((major + 1)).0.0\"\n      ;;\n    \"minor\") \n      NEW_VERSION=\"$major.$((minor + 1)).0\"\n      ;;\n    \"patch\")\n      NEW_VERSION=\"$major.$minor.$((patch + 1))\"\n      ;;\n  esac\n  \n  echo \"Bumping $PACKAGE from $CURRENT_VERSION to $NEW_VERSION\"\n  \n  # Store release data\n  RELEASE_DATA=\"$RELEASE_DATA $PACKAGE:$NEW_VERSION\"\ndone\n\n# Save release data for next steps\necho \"release_data=$RELEASE_DATA\" >> $GITHUB_OUTPUT\necho \"bump_type=$BUMP_TYPE\" >> $GITHUB_OUTPUT\n"
      - name: Set up Go
        if: steps.auto-release.outputs.has_release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install GoReleaser
        if: steps.auto-release.outputs.has_release == 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: '~> v2'
          install-only: true
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Create releases with GoReleaser
        if: steps.auto-release.outputs.has_release == 'true'
        run: "RELEASE_DATA=\"${{ steps.prepare-releases.outputs.release_data }}\"\n\n# Set up git user\ngit config user.name \"github-actions[bot]\"\ngit config user.email \"github-actions[bot]@users.noreply.github.com\"\n\nfor RELEASE_INFO in $RELEASE_DATA; do\n  PACKAGE=$(echo \"$RELEASE_INFO\" | cut -d':' -f1)\n  NEW_VERSION=$(echo \"$RELEASE_INFO\" | cut -d':' -f2)\n  \n  echo \"Creating release for $PACKAGE version $NEW_VERSION\"\n  \n  # Create appropriate tag\n  case \"$PACKAGE\" in\n    \"@devex/cli\")\n      TAG=\"@devex/cli@$NEW_VERSION\"\n      GORELEASER_CONFIG=\"apps/cli/.goreleaser.yml\"\n      ;;\n    \"@devex/plugin-sdk\")\n      TAG=\"@devex/plugin-sdk@$NEW_VERSION\"\n      GORELEASER_CONFIG=\"packages/plugin-sdk/.goreleaser.yml\"\n      ;;\n    @devex/*)\n      TAG=\"$PACKAGE@$NEW_VERSION\"\n      PLUGIN_NAME=$(echo \"$PACKAGE\" | sed 's/@devex\\///')\n      GORELEASER_CONFIG=\"packages/$PLUGIN_NAME/.goreleaser.yml\"\n      ;;\n  esac\n  \n  echo \"Creating tag: $TAG\"\n  git tag -a \"$TAG\" -m \"Release $PACKAGE $NEW_VERSION\"\n  git push origin \"$TAG\"\n  \n  # Run GoReleaser for this package\n  if [ -f \"$GORELEASER_CONFIG\" ]; then\n    echo \"Running GoReleaser with config: $GORELEASER_CONFIG\"\n    goreleaser release --clean -f \"$GORELEASER_CONFIG\" || echo \"::warning::GoReleaser failed for $PACKAGE\"\n  else\n    echo \"::warning::No GoReleaser config found at $GORELEASER_CONFIG\"\n  fi\n  \n  # Update package.json with new version\n  case \"$PACKAGE\" in\n    \"@devex/cli\")\n      if [ -f \"apps/cli/package.json\" ]; then\n        jq \".version = \\\"$NEW_VERSION\\\"\" apps/cli/package.json > apps/cli/package.json.tmp\n        mv apps/cli/package.json.tmp apps/cli/package.json\n      fi\n      ;;\n    \"@devex/plugin-sdk\")\n      if [ -f \"packages/plugin-sdk/package.json\" ]; then\n        jq \".version = \\\"$NEW_VERSION\\\"\" packages/plugin-sdk/package.json > packages/plugin-sdk/package.json.tmp\n        mv packages/plugin-sdk/package.json.tmp packages/plugin-sdk/package.json\n      fi\n      ;;\n    @devex/*)\n      PACKAGE_DIR=\"packages/$(echo \"$PACKAGE\" | sed 's/@devex\\///')\"\n      if [ -f \"$PACKAGE_DIR/package.json\" ]; then\n        jq \".version = \\\"$NEW_VERSION\\\"\" \"$PACKAGE_DIR/package.json\" > \"$PACKAGE_DIR/package.json.tmp\"\n        mv \"$PACKAGE_DIR/package.json.tmp\" \"$PACKAGE_DIR/package.json\"\n      fi\n      ;;\n  esac\ndone\n\n# Commit version updates\nif ! git diff --quiet; then\n  git add -A\n  git commit -m \"chore: update package versions [skip ci]\"\n  git push origin main\nfi\n"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
      - name: Update plugin registry
        if: steps.auto-release.outputs.has_release == 'true'
        run: |
          # Install registry script dependencies
          cd scripts
          npm install @octokit/rest
          cd ..

          # Generate complete registry from all plugin tags
          echo "Updating plugin registry..."
          node scripts/generate-registry.js all || echo "::warning::Failed to update registry"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
