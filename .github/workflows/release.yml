name: Build, Lint, Test, and Release
on:
  push:
    branches:
      - main
    paths:
      - 'apps/cli/**'
      - '.github/workflows/release.yml'
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write
jobs:
  # Lint and test only on Linux - Go code is platform agnostic
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('apps/cli/**/go.sum') }}
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.3.0
          working-directory: apps/cli
      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Test
        working-directory: apps/cli
        run: |
          # Run tests with timeout and verbose output
          timeout 10m ginkgo -r --timeout=5m --poll-progress-after=30s --poll-progress-interval=10s -v
  # Build web apps on Linux
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.14.0
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build web app
        run: pnpm turbo run build --filter=web
      - name: Build docs
        run: pnpm turbo run build --filter=docs
  # Release with cross-compilation via GoReleaser
  release:
    needs: [test, web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --tags
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.14.0
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run semantic-release
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
      - name: Login to Docker
        run: docker login docker.pkg.github.com -u docker -p ${{ secrets.GITHUB_TOKEN }}
      - name: Release with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: apps/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
