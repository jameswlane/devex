name: Build, Lint, Test, and Release
on:
  push:
    branches:
      - main
    paths:
      - 'apps/cli/**'
      - '.github/workflows/release.yml'
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write
jobs:
  # Build, lint, and test with Turborepo
  test:
    runs-on: ubuntu-latest
    env:
    # Add Turborepo Remote Caching if needed
    # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    # TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Cache Turborepo builds
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.15.1
          run_install: false
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Install global tools
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          go install github.com/goreleaser/goreleaser@latest
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Build all packages
        run: pnpm build
      - name: Lint all packages
        run: pnpm lint
      - name: Test all packages
        run: pnpm test
  # Build web apps on Linux
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.15.1
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build web app
        run: pnpm turbo run build --filter=web
      - name: Build docs
        run: pnpm turbo run build --filter=docs
  # Release with cross-compilation via GoReleaser
  release:
    needs: [test, web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --tags
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.15.1
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run semantic-release
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Login to Docker
        run: docker login docker.pkg.github.com -u docker -p ${{ secrets.GITHUB_TOKEN }}
      - name: Release CLI with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: apps/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Release Plugins
        run: |
          # Install Task for plugin builds
          go install github.com/go-task/task/v3/cmd/task@latest
          # Install GoReleaser for plugin releases
          go install github.com/goreleaser/goreleaser@latest

          # Build all plugins with Turborepo first
          pnpm build --filter="@devex/*"

          # Release all plugins
          chmod +x scripts/release-plugins.sh
          ./scripts/release-plugins.sh all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          OWNER: jameswlane
          REPO: devex
