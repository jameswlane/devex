name: Build, Lint, Test, and Release
on:
  push:
    branches:
      - main
    paths:
      - 'apps/cli/**'
      - 'packages/**'
      - '.github/workflows/release.yml'
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write
jobs:
  # Build, lint, and test with Turborepo
  test:
    runs-on: ubuntu-latest
    env:
    # Add Turborepo Remote Caching if needed
    # TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    # TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Cache Turborepo builds
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.15.1
          run_install: false
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Install global tools
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          go install github.com/goreleaser/goreleaser@latest
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Build all packages
        run: pnpm build
      - name: Lint all packages
        run: pnpm lint
      - name: Test all packages
        run: pnpm test
  # Build web apps on Linux
  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.15.1
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Build web app
        run: pnpm turbo run build --filter=web
      - name: Build docs
        run: pnpm turbo run build --filter=docs
  # Release with cross-compilation via GoReleaser
  release:
    needs: [test, web]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch all tags
        run: git fetch --tags
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.15.1
          run_install: false
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run semantic-release
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - name: Login to Docker
        run: docker login docker.pkg.github.com -u docker -p ${{ secrets.GITHUB_TOKEN }}
      - name: Release CLI with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
          workdir: apps/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Release Plugins
        run: |
          # Install Task for plugin builds
          go install github.com/go-task/task/v3/cmd/task@latest
          # Install GoReleaser for plugin releases
          go install github.com/goreleaser/goreleaser@latest

          # Build all plugins with Turborepo first
          pnpm build --filter="@devex/*"

          # Release all plugins
          chmod +x scripts/release-plugins.sh
          ./scripts/release-plugins.sh all
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          OWNER: jameswlane
          REPO: devex
  # Package Release - handles releases for different package types
  package-release:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'feat(') || contains(github.event.head_commit.message, 'fix(')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Detect changed packages
        id: detect
        run: |
          commit_msg="${{ github.event.head_commit.message }}"
          echo "Commit message: $commit_msg"

          # Extract package name from commit message (e.g., feat(plugin-sdk): -> plugin-sdk)
          if [[ $commit_msg =~ (feat|fix)\(([^)]+)\): ]]; then
            package_name="${BASH_REMATCH[2]}"
            echo "Detected package: $package_name"
            echo "package_name=$package_name" >> $GITHUB_OUTPUT

            # Determine package type and location
            if [ "$package_name" = "plugin-sdk" ]; then
              echo "package_type=go-module" >> $GITHUB_OUTPUT
              echo "package_path=packages/plugin-sdk" >> $GITHUB_OUTPUT
            elif [ -d "packages/plugins/$package_name" ]; then
              echo "package_type=plugin" >> $GITHUB_OUTPUT
              echo "package_path=packages/plugins/$package_name" >> $GITHUB_OUTPUT
            elif [ -d "packages/$package_name" ]; then
              echo "package_type=package" >> $GITHUB_OUTPUT
              echo "package_path=packages/$package_name" >> $GITHUB_OUTPUT
            else
              echo "Package not found: $package_name"
              exit 1
            fi

            # Determine version bump type
            if [[ $commit_msg == feat* ]]; then
              echo "bump=minor" >> $GITHUB_OUTPUT
            else
              echo "bump=patch" >> $GITHUB_OUTPUT
            fi
          else
            echo "No package specified in commit message"
            exit 0
          fi
      - name: Handle Go Module Release (plugin-sdk)
        if: steps.detect.outputs.package_type == 'go-module'
        run: |
          cd ${{ steps.detect.outputs.package_path }}

          echo "📦 Processing Go module: ${{ steps.detect.outputs.package_name }}"

          # Install dependencies and run tests
          go mod download
          go run github.com/onsi/ginkgo/v2/ginkgo run .
          go vet ./...

          # Get latest tag for this package
          package_name="${{ steps.detect.outputs.package_name }}"
          latest_tag=$(git tag -l "${package_name}/v*" | sort -V | tail -n1 || echo "${package_name}/v0.0.0")
          current_version=${latest_tag#${package_name}/v}

          echo "Current version: $current_version"

          # Calculate new version
          IFS='.' read -ra VERSION_PARTS <<< "$current_version"
          major=${VERSION_PARTS[0]:-0}
          minor=${VERSION_PARTS[1]:-0}
          patch=${VERSION_PARTS[2]:-0}

          if [ "${{ steps.detect.outputs.bump }}" = "minor" ]; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          new_version="$major.$minor.$patch"
          new_tag="${package_name}/v$new_version"

          echo "New version: $new_version"
          echo "New tag: $new_tag"

          # Create and push tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$new_tag" -m "$package_name release $new_version

          ${{ github.event.head_commit.message }}

          Installation:
          go get github.com/jameswlane/devex/packages/$package_name@$new_tag"

          git push origin "$new_tag"

          # Create GitHub Release
          gh release create "$new_tag" \
            --title "$package_name v$new_version" \
            --notes "# DevEx $package_name v$new_version

          ${{ github.event.head_commit.message }}

          ## Installation

          \`\`\`bash
          go get github.com/jameswlane/devex/packages/$package_name@$new_tag
          \`\`\`"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Handle Plugin Release
        if: steps.detect.outputs.package_type == 'plugin'
        run: |
          echo "🔌 Processing plugin: ${{ steps.detect.outputs.package_name }}"

          # Use existing plugin release system
          chmod +x scripts/release-plugin-individual.sh
          ./scripts/release-plugin-individual.sh ${{ steps.detect.outputs.package_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Handle Other Package Release
        if: steps.detect.outputs.package_type == 'package'
        run: |
          echo "📁 Processing package: ${{ steps.detect.outputs.package_name }}"
          echo "Package type 'package' handling not yet implemented"
          # Future: Add logic for other package types
