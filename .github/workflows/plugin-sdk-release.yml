name: Plugin SDK Release
permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write
on:
  push:
    paths:
      - 'packages/plugin-sdk'
      - '.github/workflows/plugin-sdk-release.yml'
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/plugin-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install dependencies
        run: go mod download
      - name: Install Ginkgo
        run: go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Run tests
        run: ginkgo run .
      - name: Run go vet
        run: go vet ./...
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: packages/plugin-sdk
  release:
    permissions:
      contents: write
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/plugin-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Calculate next version and create tag
        id: version
        run: |
          # Get the latest plugin-sdk tag
          latest_tag=$(git tag -l "plugin-sdk/v*" | sort -V | tail -n1 || echo "")

          if [ -z "$latest_tag" ]; then
            # No existing tags, start with v0.1.0
            new_version="0.1.0"
          else
            # Extract current version (remove plugin-sdk/v prefix)
            current_version=${latest_tag#plugin-sdk/v}
            echo "Current version: $current_version"

            # Parse version components
            IFS='.' read -ra VERSION_PARTS <<< "$current_version"
            major=${VERSION_PARTS[0]:-0}
            minor=${VERSION_PARTS[1]:-0}
            patch=${VERSION_PARTS[2]:-0}

            # Analyze recent commits to determine bump type
            commit_messages=$(git log --format=%s --since="24 hours ago" -- packages/plugin-sdk/ | head -5)

            if echo "$commit_messages" | grep -qE '^feat\(plugin-sdk\)!:|BREAKING CHANGE:'; then
              # Major version bump for breaking changes
              major=$((major + 1))
              minor=0
              patch=0
            elif echo "$commit_messages" | grep -qE '^feat\(plugin-sdk\):'; then
              # Minor version bump for new features
              minor=$((minor + 1))
              patch=0
            else
              # Patch version bump for fixes and other changes
              patch=$((patch + 1))
            fi

            new_version="$major.$minor.$patch"
          fi

          new_tag="plugin-sdk/v$new_version"
          echo "New version: $new_version"
          echo "New tag: $new_tag"

          # Create and push the tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$new_tag" -m "Plugin SDK v$new_version

          Automated release based on changes to packages/plugin-sdk/

          🤖 Generated with [Claude Code](https://claude.ai/code)

          Co-Authored-By: Claude <noreply@anthropic.com>"

          git push origin "$new_tag"

          # Output for next steps
          echo "version=$new_version" >> $GITHUB_OUTPUT
          echo "tag=$new_tag" >> $GITHUB_OUTPUT
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Your GoReleaser Pro key, if you are using the 'goreleaser-pro' distribution
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
  publish-go-module:
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/plugin-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Get version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/plugin-sdk/v}" >> $GITHUB_OUTPUT
          fi
      - name: Set module proxy environment
        run: |
          echo "GOPROXY=proxy.golang.org,direct" >> $GITHUB_ENV
          echo "GOSUMDB=sum.golang.org" >> $GITHUB_ENV
      - name: Trigger Go module update
        run: |
          # The Go module proxy will automatically fetch the new version
          # when it's tagged, but we can trigger it explicitly
          curl -f "https://proxy.golang.org/github.com/jameswlane/devex/packages/plugin-sdk/@v/${{ steps.version.outputs.VERSION }}.info" || true
      - name: Verify module availability
        run: |
          # Wait a bit for the module proxy to index the new version
          sleep 30
          go list -m github.com/jameswlane/devex/packages/plugin-sdk@${{ steps.version.outputs.VERSION }} || echo "Module not yet available on proxy"
