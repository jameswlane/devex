name: DevEx Integration Testing

on:
    pull_request:
        branches:
            - main

jobs:
    test-docker:
        runs-on: ubuntu-latest
        steps:
            - name: Check out PR code
              uses: actions/checkout@v3

            - name: Set up Docker
              uses: docker/setup-buildx-action@v2

            - name: Build and Test DevEx
              run: |
                  chmod +x test/docker/test-devex.sh
                  test/docker/test-devex.sh
