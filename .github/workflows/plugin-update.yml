name: Parallel Plugin Build and Deploy
on:
  push:
    branches: [main]
    paths:
      - 'packages/plugins/**'
      - 'scripts/generate-registry.js'
      - 'scripts/release-plugins.sh'
      - 'scripts/release-plugin-individual.sh'
      - '.github/workflows/plugin-update.yml'
  workflow_dispatch:
    inputs:
      plugins:
        description: 'Specific plugins to build (comma-separated, empty for all)'
        required: false
        type: string
      release_mode:
        description: 'Release mode'
        required: false
        default: 'individual'
        type: choice
        options:
          - individual
          - single-release
          - dry-run
jobs:
  # Determine which plugins to build
  detect-plugins:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect plugins to build
        id: set-matrix
        run: "# Function to get all plugins\nget_all_plugins() {\n  find packages/plugins -mindepth 1 -maxdepth 1 -type d -exec basename {} \\; | sort\n}\n\n# Function to get changed plugins\nget_changed_plugins() {\n  local last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo \"\")\n  \n  if [ -z \"$last_tag\" ]; then\n    get_all_plugins\n  else\n    git diff --name-only $last_tag..HEAD | \\\n      grep \"^packages/plugins/\" | \\\n      cut -d'/' -f3 | \\\n      sort -u\n  fi\n}\n\n# Determine plugins based on input\nif [ -n \"${{ github.event.inputs.plugins }}\" ]; then\n  # Manual input\n  IFS=',' read -ra PLUGINS <<< \"${{ github.event.inputs.plugins }}\"\n  plugin_list=()\n  for p in \"${PLUGINS[@]}\"; do\n    plugin_list+=(\"$(echo $p | xargs)\")\n  done\nelif [ \"${{ github.event_name }}\" = \"workflow_dispatch\" ]; then\n  # Manual run without specific plugins - build all\n  plugin_list=($(get_all_plugins))\nelse\n  # Auto-detect changed plugins\n  plugin_list=($(get_changed_plugins))\nfi\n\n# Create matrix JSON\nif [ ${#plugin_list[@]} -gt 0 ]; then\n  matrix_json=$(printf '%s\\n' \"${plugin_list[@]}\" | jq -R . | jq -s -c '{plugin: .}')\n  echo \"matrix=$matrix_json\" >> $GITHUB_OUTPUT\n  echo \"has-changes=true\" >> $GITHUB_OUTPUT\n  echo \"Building plugins: ${plugin_list[*]}\"\nelse\n  echo \"matrix={\\\"plugin\\\":[]}\" >> $GITHUB_OUTPUT\n  echo \"has-changes=false\" >> $GITHUB_OUTPUT\n  echo \"No plugins to build\"\nfi\n"
  # Build and validate plugins in parallel
  build-plugin:
    needs: detect-plugins
    if: needs.detect-plugins.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-plugins.outputs.matrix) }}
    outputs:
      success: ${{ steps.build.outputs.success }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.plugin }}-${{ hashFiles(format('packages/plugins/{0}/go.sum', matrix.plugin)) }}
      - name: Install Task
        run: go install github.com/go-task/task/v3/cmd/task@latest
      - name: Build and test plugin
        id: build
        run: |
          cd packages/plugins/${{ matrix.plugin }}

          echo "::group::Building ${{ matrix.plugin }}"

          # Run tests if they exist
          if [ -f "Taskfile.yml" ] && grep -q "test:" Taskfile.yml; then
            echo "Running tests..."
            task test || {
              echo "Tests failed for ${{ matrix.plugin }}"
              echo "success=false" >> $GITHUB_OUTPUT
              exit 1
            }
          fi

          # Build the plugin
          echo "Building plugin..."
          go build -v -o devex-plugin-${{ matrix.plugin }} . || {
            echo "Build failed for ${{ matrix.plugin }}"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          }

          # Test plugin info command
          echo "Testing plugin info..."
          ./devex-plugin-${{ matrix.plugin }} --plugin-info || {
            echo "Plugin info test failed for ${{ matrix.plugin }}"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          }

          echo "::endgroup::"
          echo "success=true" >> $GITHUB_OUTPUT
          echo "✅ Successfully built ${{ matrix.plugin }}"
      - name: Upload build artifact
        if: steps.build.outputs.success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}
          path: packages/plugins/${{ matrix.plugin }}/devex-plugin-${{ matrix.plugin }}
          retention-days: 1
  # Release successful plugins
  release-plugins:
    needs: [detect-plugins, build-plugin]
    if: always() && needs.detect-plugins.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.6
      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser@latest
      - name: Download successful build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./plugin-artifacts
          pattern: plugin-*
      - name: List available plugins
        id: list-plugins
        run: |
          # Find all successfully built plugins
          successful_plugins=()
          failed_plugins=()

          # Get all plugins from matrix
          all_plugins='${{ toJSON(fromJSON(needs.detect-plugins.outputs.matrix).plugin) }}'

          # Check which plugins have artifacts (successful builds)
          for plugin in $(echo "$all_plugins" | jq -r '.[]'); do
            if [ -d "./plugin-artifacts/plugin-$plugin" ]; then
              successful_plugins+=("$plugin")
            else
              failed_plugins+=("$plugin")
            fi
          done

          echo "successful_plugins=$(printf '%s\n' "${successful_plugins[@]}" | jq -R . | jq -s -c .)" >> $GITHUB_OUTPUT
          echo "failed_plugins=$(printf '%s\n' "${failed_plugins[@]}" | jq -R . | jq -s -c .)" >> $GITHUB_OUTPUT

          echo "✅ Successful plugins: ${successful_plugins[*]}"
          echo "❌ Failed plugins: ${failed_plugins[*]}"
      - name: Prepare release based on mode
        id: prepare-release
        run: |
          mode="${{ github.event.inputs.release_mode }}"

          # Default to individual releases for push events
          if [ -z "$mode" ] || [ "$mode" = "individual" ]; then
            echo "release_mode=individual" >> $GITHUB_OUTPUT
          else
            echo "release_mode=$mode" >> $GITHUB_OUTPUT
          fi

          # Generate release tag
          if [ "$mode" = "single-release" ]; then
            echo "release_tag=plugins-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          else
            echo "release_tag=individual" >> $GITHUB_OUTPUT
          fi
      - name: Determine plugin versions
        id: versions
        run: "successful_plugins='${{ steps.list-plugins.outputs.successful_plugins }}'\n\n# Process each plugin to determine version\necho '{}' > plugin_versions.json\nfor plugin in $(echo \"$successful_plugins\" | jq -r '.[]'); do\n  echo \"Determining version for $plugin...\"\n  \n  # Get version info\n  version_info=$(node scripts/determine-plugin-version.js check \"$plugin\" 2>/dev/null || echo '{}')\n  \n  if [ -n \"$version_info\" ] && [ \"$version_info\" != \"{}\" ]; then\n    new_version=$(echo \"$version_info\" | jq -r '.newVersion // \"0.1.0\"')\n    \n    # Update package.json with new version\n    node scripts/determine-plugin-version.js update \"$plugin\"\n    \n    # Add to versions JSON\n    jq --arg p \"$plugin\" --arg v \"$new_version\" '.[$p] = $v' plugin_versions.json > tmp.json && mv tmp.json plugin_versions.json\n    \n    echo \"Plugin $plugin: $new_version\"\n  fi\ndone\n\nplugin_versions=$(cat plugin_versions.json)\necho \"plugin_versions=$plugin_versions\" >> $GITHUB_OUTPUT\n\n# Commit version updates if any\nif [ -n \"$(git status --porcelain packages/plugins/*/package.json)\" ]; then\n  git config --local user.email \"action@github.com\"\n  git config --local user.name \"GitHub Action\"\n  git add packages/plugins/*/package.json\n  git commit -m \"chore: bump plugin versions based on conventional commits\n  \n  $(echo \"$successful_plugins\" | jq -r '.[]' | while read plugin; do\n    version=$(echo \"$plugin_versions\" | jq -r --arg p \"$plugin\" '.[$p] // \"\"')\n    [ -n \"$version\" ] && echo \"- $plugin: v$version\"\n  done)\"\nfi\n"
      - name: Create individual releases
        if: steps.prepare-release.outputs.release_mode == 'individual' && steps.prepare-release.outputs.release_mode != 'dry-run'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: "successful_plugins='${{ steps.list-plugins.outputs.successful_plugins }}'\nplugin_versions='${{ steps.versions.outputs.plugin_versions }}'\n\nfor plugin in $(echo \"$successful_plugins\" | jq -r '.[]'); do\n  echo \"::group::Releasing $plugin\"\n  \n  # Get the semantic version for this plugin\n  version=$(echo \"$plugin_versions\" | jq -r --arg p \"$plugin\" '.[$p] // \"0.1.0\"')\n  \n  # Create plugin-specific goreleaser config\n  cat > .goreleaser.$plugin.yml << EOF\nversion: 2\nproject_name: devex-plugin-$plugin\n\nbuilds:\n  - id: $plugin\n    main: ./packages/plugins/$plugin\n    binary: devex-plugin-$plugin\n    env:\n      - CGO_ENABLED=0\n    goos:\n      - linux\n      - darwin\n      - windows\n    goarch:\n      - amd64\n      - arm64\n    ldflags:\n      - -s -w\n      - -X main.version={{.Version}}\n\narchives:\n  - format: tar.gz\n    format_overrides:\n      - goos: windows\n        format: zip\n    name_template: \"{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}\"\n\nchecksum:\n  name_template: 'checksums.txt'\n\nrelease:\n  github:\n    owner: jameswlane\n    name: devex\n  name_template: \"Plugin {{ .ProjectName }} v{{ .Version }}\"\n  mode: append\nEOF\n  \n  # Create a semantic version tag for this plugin\n  plugin_tag=\"${plugin}-v${version}\"\n  \n  # Check if tag already exists\n  if git rev-parse \"$plugin_tag\" >/dev/null 2>&1; then\n    echo \"Tag $plugin_tag already exists, skipping release for $plugin\"\n    rm .goreleaser.$plugin.yml\n    echo \"::endgroup::\"\n    continue\n  fi\n  \n  # Create annotated tag\n  git tag -a \"$plugin_tag\" -m \"Release $plugin v$version\"\n  \n  # Run goreleaser for this plugin\n  goreleaser release --config .goreleaser.$plugin.yml --clean || {\n    echo \"::warning::Failed to release $plugin\"\n  }\n  \n  rm .goreleaser.$plugin.yml\n  echo \"::endgroup::\"\ndone\n"
      - name: Create single release for all plugins
        if: steps.prepare-release.outputs.release_mode == 'single-release' && steps.prepare-release.outputs.release_mode != 'dry-run'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          successful_plugins='${{ steps.list-plugins.outputs.successful_plugins }}'
          release_tag="${{ steps.prepare-release.outputs.release_tag }}"

          # Create combined goreleaser config
          cat > .goreleaser.all.yml << EOF
          version: 2
          project_name: devex-plugins

          builds:
          EOF

          # Add each successful plugin to the builds
          for plugin in $(echo "$successful_plugins" | jq -r '.[]'); do
            cat >> .goreleaser.all.yml << EOF
            - id: $plugin
              main: ./packages/plugins/$plugin
              binary: devex-plugin-$plugin
              env:
                - CGO_ENABLED=0
              goos:
                - linux
                - darwin
                - windows
              goarch:
                - amd64
                - arm64
              ldflags:
                - -s -w
                - -X main.version={{.Version}}
          EOF
          done

          # Complete the config
          cat >> .goreleaser.all.yml << EOF

          archives:
            - format: tar.gz
              format_overrides:
                - goos: windows
                  format: zip
              name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

          checksum:
            name_template: 'checksums.txt'

          release:
            github:
              owner: jameswlane
              name: devex
            name_template: "Plugins Release {{ .Tag }}"
          EOF

          # Create tag and release
          git tag -a "$release_tag" -m "Plugin release: $(echo "$successful_plugins" | jq -r '.[]' | tr '\n' ' ')"
          goreleaser release --config .goreleaser.all.yml --clean

          rm .goreleaser.all.yml
  # Update registry with all releases
  update-registry:
    needs: [release-plugins]
    if: always() && github.event.inputs.release_mode != 'dry-run'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - name: Install dependencies
        run: |
          cd scripts
          npm install @octokit/rest
      - name: Generate registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get latest tags for all plugins
          latest_tags=$(git tag -l | grep -E '^(plugin-|packages/plugins/)' | sort -V | tail -20)

          # Generate registry for each tag
          for tag in $latest_tags; do
            echo "Processing tag: $tag"
            node scripts/generate-registry.js "$tag" || echo "::warning::Failed to process $tag"
          done
      - name: Deploy registry to Vercel
        run: |
          cd apps/registry
          pnpm install
          npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Commit registry updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add apps/registry/public/v1/registry.json apps/registry/public/v1/index.json || true
          git diff --staged --quiet || git commit -m "chore: update plugin registry [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Summary job
  build-summary:
    needs: [detect-plugins, build-plugin, release-plugins, update-registry]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build Summary
        run: |
          echo "# Plugin Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if any plugins were detected
          if [ "${{ needs.detect-plugins.outputs.has-changes }}" != "true" ]; then
            echo "ℹ️ No plugins needed to be built." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Parse job results
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Get successful and failed plugins from release job
          if [ -n "${{ needs.release-plugins.outputs.successful_plugins }}" ]; then
            echo "### ✅ Successful Plugins" >> $GITHUB_STEP_SUMMARY
            echo "${{ needs.release-plugins.outputs.successful_plugins }}" | jq -r '.[]' | while read plugin; do
              echo "- $plugin" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "${{ needs.release-plugins.outputs.failed_plugins }}" ]; then
            echo "### ❌ Failed Plugins" >> $GITHUB_STEP_SUMMARY
            echo "${{ needs.release-plugins.outputs.failed_plugins }}" | jq -r '.[]' | while read plugin; do
              echo "- $plugin" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Overall status
          echo "## Overall Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.update-registry.result }}" = "success" ]; then
            echo "✅ Registry updated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Registry update had issues" >> $GITHUB_STEP_SUMMARY
          fi
