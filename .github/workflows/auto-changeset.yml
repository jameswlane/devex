name: Auto Generate Changesets

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'apps/cli/**'
      - '!**.md'
      - '!**/*.test.*'
      - '!**/*_test.go'
      - '!**/docs/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-changeset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect changes and create changesets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are already pending changesets
          if [ -n "$(find .changeset -name "*.md" -not -name "README.md" 2>/dev/null)" ]; then
            echo "⚠️ Changesets already exist, skipping auto-generation"
            exit 0
          fi

          # Get the commit range
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            COMMIT_RANGE="HEAD~1..HEAD"
          else
            COMMIT_RANGE="${{ github.event.before }}..HEAD"
          fi

          echo "Checking changes in commit range: $COMMIT_RANGE"

          CHANGED_PACKAGES=""
          BUMP_TYPE="patch"

          # Function to determine bump type from commit messages
          determine_bump_type() {
            local commits="$1"
            if echo "$commits" | grep -qE "BREAKING CHANGE|breaking:|!:"; then
              echo "major"
            elif echo "$commits" | grep -q "^feat"; then
              echo "minor"
            else
              echo "patch"
            fi
          }

          # Check CLI changes
          if git diff --name-only $COMMIT_RANGE | grep -q "^apps/cli/"; then
            echo "✅ CLI changed"
            COMMITS=$(git log --pretty=format:"%s" $COMMIT_RANGE -- apps/cli/)
            CLI_BUMP=$(determine_bump_type "$COMMITS")
            CHANGED_PACKAGES="$CHANGED_PACKAGES\"@devex/cli\": \"$CLI_BUMP\","
            echo "CLI will be bumped as: $CLI_BUMP"
          fi

          # Check Plugin SDK changes
          if git diff --name-only $COMMIT_RANGE | grep -q "^packages/plugin-sdk/"; then
            echo "✅ Plugin SDK changed"
            COMMITS=$(git log --pretty=format:"%s" $COMMIT_RANGE -- packages/plugin-sdk/)
            SDK_BUMP=$(determine_bump_type "$COMMITS")
            CHANGED_PACKAGES="$CHANGED_PACKAGES\"@devex/plugin-sdk\": \"$SDK_BUMP\","
            echo "Plugin SDK will be bumped as: $SDK_BUMP"
          fi

          # Check plugin changes
          for dir in packages/package-manager-* packages/desktop-* packages/tool-* packages/system-setup; do
            if [ -d "$dir" ] && git diff --name-only $COMMIT_RANGE | grep -q "^$dir/"; then
              plugin_name=$(basename "$dir")
              echo "✅ Plugin $plugin_name changed"

              COMMITS=$(git log --pretty=format:"%s" $COMMIT_RANGE -- "$dir/")
              PLUGIN_BUMP=$(determine_bump_type "$COMMITS")

              # Get package name from package.json
              if [ -f "$dir/package.json" ]; then
                PKG_NAME=$(node -p "require('./$dir/package.json').name")
                CHANGED_PACKAGES="$CHANGED_PACKAGES\"$PKG_NAME\": \"$PLUGIN_BUMP\","
                echo "Plugin $plugin_name ($PKG_NAME) will be bumped as: $PLUGIN_BUMP"
              fi
            fi
          done

          # Remove trailing comma
          CHANGED_PACKAGES=${CHANGED_PACKAGES%,}

          if [ -z "$CHANGED_PACKAGES" ]; then
            echo "No relevant packages changed, no changeset needed"
            exit 0
          fi

          # Create changeset file
          CHANGESET_ID=$(openssl rand -hex 4)
          CHANGESET_FILE=".changeset/${CHANGESET_ID}.md"

          # Get commit messages for summary
          SUMMARY=$(git log --pretty=format:"- %s" $COMMIT_RANGE -- apps/cli/ packages/)

          cat > "$CHANGESET_FILE" <<'EOF'
---
PLACEHOLDER_PACKAGES
---

Automated release based on detected changes:

PLACEHOLDER_SUMMARY
EOF
          
          # Replace placeholders with actual values
          sed -i "s/PLACEHOLDER_PACKAGES/{$CHANGED_PACKAGES}/" "$CHANGESET_FILE"
          sed -i "s/PLACEHOLDER_SUMMARY/$SUMMARY/" "$CHANGESET_FILE"

          echo "✅ Created changeset: $CHANGESET_FILE"
          cat "$CHANGESET_FILE"

          # Commit the changeset
          git add "$CHANGESET_FILE"
          git commit -m "chore: add automated changeset for release"
          git push origin main

          echo "🚀 Changeset committed and pushed!"
