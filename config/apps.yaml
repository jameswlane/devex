            key_name: "mise-archive-keyring"
            source_repo: "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.gpg arch=amd64] https://mise.jdx.dev/deb stable main"
            source_name: "mise"
      dependencies:
          - "curl"
          - "gpg"
          - "wget"

