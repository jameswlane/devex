    - name: fzf
      description: "A command-line fuzzy finder"
      github: "https://github.com/junegunn/fzf"
      url: "https://junegunn.github.io/fzf/"
      category: "Utilities"
      default: true
      install_method: "apt"
      install_command: "fzf"
      uninstall_command: "fzf"

    - name: GitHub CLI
      description: "GitHub’s official command line tool "
      github: "https://github.com/cli/cli"
      url: "https://cli.github.com/"
      category: "Development Tools"
      install_method: "apt"
      install_command: "gh"
      uninstall_command: "gh"
      apt_sources:
          -   key_source: "https://cli.github.com/packages/githubcli-archive-keyring.gpg"
              key_name: "githubcli-archive-keyring"
              source_repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
              source_name: "github-cli"
      dependencies:
          - "curl"
          - "gpg"
          - "wget"

