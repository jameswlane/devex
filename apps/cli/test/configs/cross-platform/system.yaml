git:
  - aliases:
      st: 'status'
      co: 'checkout'
      br: 'branch'
      ci: 'commit'
      di: 'diff'
      dc: 'diff --cached'
      amend: 'commit --amend'
      aa: 'add --all'
      ff: 'merge --ff-only'
      pullff: 'pull --ff-only'
      noff: 'merge --no-ff'
      fa: 'fetch --all'
      pom: 'push origin master'
      b: 'branch'
      ba: 'branch -a'
      bd: 'branch -d'
      bdd: 'branch -D'
      h: '!git head'
      r: '!git recent'
      hp: '!git head --patch'
      recent: "for-each-ref --count=15 --sort=-committerdate refs/heads/ --format='%(refname:short)'"
      head: 'log -1 HEAD --stat'
    settings:
      user.name: '{{ .USER_NAME }}'
      user.email: '{{ .USER_EMAIL }}'
      pull.rebase: true
      init.defaultBranch: 'main'
      core.editor: 'code --wait'
      merge.tool: 'vscode'
      mergetool.vscode.cmd: 'code --wait $MERGED'
      diff.tool: 'vscode'
      difftool.vscode.cmd: 'code --wait --diff $LOCAL $REMOTE'
ssh:
  config:
    - host: 'github.com'
      hostname: 'github.com'
      user: 'git'
      identity_file: '~/.ssh/id_ed25519'
    - host: 'gitlab.com'
      hostname: 'gitlab.com'
      user: 'git'
      identity_file: '~/.ssh/id_ed25519'
terminal:
  linux:
    gnome:
      profile_settings:
        - key: 'background-color'
          value: '#1e1e2e'
        - key: 'foreground-color'
          value: '#cdd6f4'
        - key: 'use-theme-colors'
          value: false
        - key: 'font'
          value: 'JetBrains Mono 12'
    kde:
      konsole_profile: 'Catppuccin.profile'
  macos:
    iterm2_profile: 'Catppuccin.json'
    preferences:
      - key: 'Default Bookmark Guid'
        value: '{{ .ITERM2_PROFILE_GUID }}'
  windows:
    windows_terminal:
      settings_file: '~/.config/windows-terminal/settings.json'
      profile:
        name: 'PowerShell'
        color_scheme: 'Catppuccin Mocha'
        font:
          face: 'JetBrains Mono'
          size: 12
