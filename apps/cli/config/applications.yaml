  system_tools:
  databases:
    - name: Redis Tools
      description: 'Tools for working with Redis'
      category: 'Databases'
      linux:
        install_method: 'apt'
        install_command: 'redis-tools'
        uninstall_command: 'redis-tools'
        dependencies:
          - 'redis'
          - 'apt'
    - name: SQLite Libraries
      description: 'SQLite libraries for database operations'
      category: 'Databases'
      linux:
        install_method: 'apt'
        install_command: 'sqlite3 libsqlite3-0'
        uninstall_command: 'sqlite3 libsqlite3-0'
        dependencies:
          - 'apt'
    - name: MySQL Development Libraries
      description: 'Development libraries for MySQL'
      category: 'Databases'
      linux:
        install_method: 'apt'
        install_command: 'default-libmysqlclient-dev'
        uninstall_command: 'default-libmysqlclient-dev'
        dependencies:
          - 'apt'
    - name: MySQL
      description: 'MySQL relational database management system'
      category: 'Databases'
      all_platforms:
        install_method: 'docker'
        install_command: 'mysql:8.4'
        docker_options:
          ports:
            - '127.0.0.1:3306:3306'
          container_name: 'mysql8'
          environment:
            - MYSQL_ROOT_PASSWORD=
            - MYSQL_ALLOW_EMPTY_PASSWORD=true
          restart_policy: 'unless-stopped'
    - name: Redis
      description: 'Redis in-memory data structure store'
      category: 'Databases'
      default: false
      all_platforms:
        install_method: 'docker'
        install_command: 'redis:7'
        docker_options:
          ports:
            - '127.0.0.1:6379:6379'
          container_name: 'redis'
          restart_policy: 'unless-stopped'
    - name: PostgreSQL
      description: 'PostgreSQL relational database system'
      category: 'Databases'
      default: false
      all_platforms:
        install_method: 'docker'
        install_command: 'postgres:16'
        docker_options:
          ports:
            - '127.0.0.1:5432:5432'
          container_name: 'postgres16'
          environment:
            - POSTGRES_HOST_AUTH_METHOD=trust
          restart_policy: 'unless-stopped'
  optional:
    - name: 'Proton Mail'
      description: 'Secure email app by Proton'
      category: 'Optional Apps'
      desktop_environments: ['all']
      linux:
        install_method: 'deb'
        install_command: 'wget https://proton.me/download/mail/linux/1.2.4/ProtonMail-desktop-beta.deb && sudo apt install ./ProtonMail-desktop-beta.deb'
        uninstall_command: 'sudo apt remove protonmail-desktop-beta'
        dependencies:
          - 'apt'
    - name: 'Proton VPN'
      description: 'VPN service by Proton'
      category: 'Optional Apps'
      desktop_environments: ['gnome-family']
      linux:
        install_method: 'script'
        install_command: |
          wget https://repo.protonvpn.com/debian/dists/stable/main/binary-all/protonvpn-stable-release_1.0.4_all.deb &&
          sudo dpkg -i ./protonvpn-stable-release_1.0.4_all.deb && sudo apt update &&
          sudo apt install proton-vpn-gnome-desktop libayatana-appindicator3-1 gir1.2-ayatanaappindicator3-0.1 gnome-shell-extension-appindicator
        uninstall_command: 'sudo apt remove proton-vpn-gnome-desktop libayatana-appindicator3-1 gir1.2-ayatanaappindicator3-0.1 gnome-shell-extension-appindicator'
        dependencies:
          - 'apt'
    - name: 'Proton Pass'
      description: 'Password manager by Proton'
      category: 'Optional Apps'
      desktop_environments: ['all']
      linux:
        install_method: 'deb'
        install_command: 'wget https://proton.me/download/pass/linux/proton-pass_1.23.1_amd64.deb && sudo apt install ./proton-pass_1.23.1_amd64.deb'
        uninstall_command: 'sudo apt remove proton-pass'
        dependencies:
          - 'apt'
    - name: 'Zen Browser'
      description: 'A secure and private browser'
      category: 'Optional Apps'
      desktop_environments: ['all']
      linux:
        install_method: 'flatpak'
        install_command: 'flatpak install flathub io.github.zen_browser.zen'
        uninstall_command: 'flatpak remove io.github.zen_browser.zen'
        dependencies:
          - 'flatpak'
    - name: 'GNOME Tweaks'
      description: 'Advanced GNOME 3 settings'
      category: 'Optional Apps'
      desktop_environments: ['gnome']
      linux:
        install_method: 'apt'
        install_command: 'gnome-tweaks'
        uninstall_command: 'gnome-tweaks'
    - name: 'GNOME Extensions'
      description: 'Browser extension for managing GNOME Shell extensions'
      category: 'Optional Apps'
      desktop_environments: ['gnome']
      linux:
        install_method: 'apt'
        install_command: 'chrome-gnome-shell'
        uninstall_command: 'chrome-gnome-shell'
    - name: 'KDE Connect'
      description: 'Integrate Android/iOS devices with your desktop'
      category: 'Optional Apps'
      desktop_environments: ['kde', 'gnome', 'xfce']
      linux:
        install_method: 'apt'
        install_command: 'kdeconnect'
        uninstall_command: 'kdeconnect'
    - name: 'Dolphin File Manager'
      description: 'KDE file manager'
      category: 'Optional Apps'
      desktop_environments: ['kde']
      linux:
        install_method: 'apt'
        install_command: 'dolphin'
        uninstall_command: 'dolphin'
