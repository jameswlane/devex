# Desktop Environment Compatibility Guide:
# - Use 'desktop_environments' field to specify which desktop environments an app supports
# - Available values: 'gnome', 'kde', 'xfce', 'cinnamon', 'unity', 'gnome-family', 'all'
# - 'gnome-family' includes: gnome, unity, cinnamon
# - 'all' means compatible with any desktop environment
# - If field is omitted, app is assumed compatible with all environments
# - Examples:
#   desktop_environments: ['gnome']           # GNOME-only app (GNOME Tweaks)
#   desktop_environments: ['kde']             # KDE-only app (Dolphin File Manager)
#   desktop_environments: ['kde', 'gnome']    # Works well with both KDE and GNOME
#   desktop_environments: ['gnome-family']   # Works with GNOME-based DEs
#   desktop_environments: ['all']            # Universal compatibility
applications:
  development:
    - name: bat
      description: 'A cat(1) clone with wings'
      category: 'Utilities'
      default: false
      linux:
        install_method: 'apt'
        install_command: 'bat'
        uninstall_command: 'bat'
    - name: btop
      description: 'A resource monitor that shows usage and stats for processor, memory, disks, network and processes'
      category: 'System Monitoring'
      default: false
      desktop_environments: ['all']
      linux:
        install_method: 'apt'
        install_command: 'btop'
        uninstall_command: 'btop'
        official_support: true
        config_files:
          - source: '~/.local/share/devex/assets/defaults/btop/btop.conf'
            destination: '~/.config/btop/btop.conf'
          - source: '~/.local/share/devex/assets/themes/btop/tokyo-night/btop.theme'
            destination: '~/.config/btop/themes/tokyo-night.theme'
        alternatives:
          - install_method: 'dnf'
            install_command: 'btop'
            uninstall_command: 'btop'
            official_support: true
            platform_requirements:
              - os: 'fedora'
          - install_method: 'dnf'
            install_command: 'btop'
            uninstall_command: 'btop'
            official_support: true
            platform_requirements:
              - os: 'rhel'
              - os: 'rocky'
              - os: 'almalinux'
            pre_install:
              - shell: 'dnf install -y epel-release'
          - install_method: 'zypper'
            install_command: 'btop'
            uninstall_command: 'btop'
            official_support: true
            platform_requirements:
              - os: 'opensuse-tumbleweed'
          - install_method: 'snap'
            install_command: 'btop'
            uninstall_command: 'btop'
            official_support: true
            post_install:
              - shell: 'snap connect btop:removable-media'
          - install_method: 'snap'
            install_command: 'btop-desktop'
            uninstall_command: 'btop-desktop'
            official_support: true
            post_install:
              - shell: 'snap connect btop-desktop:removable-media'
      macos:
        install_method: 'brew'
        install_command: 'btop'
        uninstall_command: 'btop'
        official_support: true
        config_files:
          - source: '~/.local/share/devex/assets/defaults/btop/btop.conf'
            destination: '~/.config/btop/btop.conf'
          - source: '~/.local/share/devex/assets/themes/btop/tokyo-night/btop.theme'
            destination: '~/.config/btop/themes/tokyo-night.theme'
      freebsd:
        install_method: 'pkg'
        install_command: 'btop'
        uninstall_command: 'btop'
        official_support: true
      netbsd:
        install_method: 'pkg_add'
        install_command: 'btop'
        uninstall_command: 'btop'
        official_support: true
    - name: ca-certificates
      description: 'Common CA certificates'
      category: 'Dependency'
      linux:
        install_method: 'apt'
        install_command: 'ca-certificates'
    - name: curl
      description: 'A tool to transfer data from or to a server'
      category: 'dependency'
      linux:
        install_method: 'apt'
        install_command: 'curl'
    - name: Eza
      description: 'A modern alternative to ls'
      category: 'System Utilities'
      default: true
      desktop_environments: ['all']
      macos:
        install_method: 'brew'
        install_command: 'eza'
        uninstall_command: 'eza'
        official_support: true
      windows:
        install_method: 'winget'
        install_command: 'eza-community.eza'
        uninstall_command: 'eza-community.eza'
        official_support: true
        alternatives:
          - install_method: 'scoop'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
          - install_method: 'cargo'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
      linux:
        install_method: 'apt'
        install_command: 'eza'
        uninstall_command: 'eza'
        official_support: true
        apt_sources:
          - key_source: 'https://raw.githubusercontent.com/eza-community/eza/main/deb.asc'
            key_name: '/etc/apt/keyrings/gierens.gpg'
            source_repo: 'deb [signed-by=/etc/apt/keyrings/gierens.gpg] http://deb.gierens.de stable main'
            source_name: '/etc/apt/sources.list.d/gierens.list'
            require_dearmor: true
        platform_requirements:
          - os: 'debian'
            dependencies:
              - 'curl'
              - 'gpg'
          - os: 'ubuntu'
            dependencies:
              - 'curl'
              - 'gpg'
        alternatives:
          - install_method: 'pacman'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'arch'
          - install_method: 'dnf'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'fedora'
          - install_method: 'zypper'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'opensuse'
          - install_method: 'emerge'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'gentoo'
          - install_method: 'xbps'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'void'
          - install_method: 'pkg'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'freebsd'
          - install_method: 'pkg_add'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'openbsd'
          - install_method: 'nixpkgs'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'nixos'
          - install_method: 'cargo'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
    - name: fzf
      description: 'A command-line fuzzy finder'
      category: 'Utilities'
      default: false
      linux:
        install_method: 'apt'
        install_command: 'fzf'
        uninstall_command: 'fzf'
    - name: git
      description: 'A distributed version control system'
      category: 'Dependency'
      linux:
        install_method: 'apt'
        install_command: 'git'
    - name: GitHub CLI
      description: 'GitHub official command line tool'
      category: 'Development Tools'
      default: true
      desktop_environments: ['all']
      macos:
        install_method: 'brew'
        install_command: 'gh'
        uninstall_command: 'gh'
        official_support: true
        alternatives:
          - install_method: 'macports'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
      windows:
        install_method: 'winget'
        install_command: 'GitHub.cli'
        uninstall_command: 'GitHub.cli'
        official_support: true
        alternatives:
          - install_method: 'chocolatey'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
          - install_method: 'scoop'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
      linux:
        install_method: 'apt'
        install_command: 'gh'
        uninstall_command: 'gh'
        official_support: true
        apt_sources:
          - key_source: 'https://cli.github.com/packages/githubcli-archive-keyring.gpg'
            key_name: '/etc/apt/keyrings/githubcli-archive-keyring.gpg'
            key_fingerprint: '23F3D4EA75716F8B2E1A5E1A50F32B5B1B4A2C1C'
            source_repo: 'deb [arch=%ARCHITECTURE% signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main'
            source_name: '/etc/apt/sources.list.d/github-cli.list'
        platform_requirements:
          - os: 'debian'
            dependencies:
              - 'curl'
              - 'gnupg'
          - os: 'ubuntu'
            dependencies:
              - 'curl'
              - 'gnupg'
        alternatives:
          - install_method: 'dnf'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: true
            platform_requirements:
              - os: 'fedora'
              - version: '41+'
            pre_install:
              - shell: 'dnf install dnf5-plugins'
              - shell: 'dnf config-manager addrepo --from-repofile=https://cli.github.com/packages/rpm/gh-cli.repo'
          - install_method: 'dnf'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: true
            platform_requirements:
              - os: 'rhel'
                version: '9+'
              - os: 'centos'
                version: '9+'
            pre_install:
              - shell: "dnf install 'dnf-command(config-manager)'"
              - shell: 'dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo'
          - install_method: 'yum'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: true
            platform_requirements:
              - os: 'amazonlinux'
                version: '2'
            pre_install:
              - shell: 'type -p yum-config-manager >/dev/null || yum install yum-utils'
              - shell: 'yum-config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo'
          - install_method: 'zypper'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: true
            platform_requirements:
              - os: 'opensuse'
              - os: 'suse'
            pre_install:
              - shell: 'zypper addrepo https://cli.github.com/packages/rpm/gh-cli.repo'
              - shell: 'zypper ref'
          - install_method: 'pacman'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'arch'
          - install_method: 'emerge'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'gentoo'
          - install_method: 'xbps'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'void'
          - install_method: 'pkg'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
            platform_requirements:
              - os: 'freebsd'
          - install_method: 'pkg_add'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'openbsd'
          - install_method: 'nixpkgs'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
            platform_requirements:
              - os: 'nixos'
          - install_method: 'apk'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'alpine'
    - name: gpg
      description: 'A tool for secure communication and data storage'
      category: 'Dependency'
      linux:
        install_method: 'apt'
        install_command: 'gpg'
    - name: Neovim
      description: 'Vim-fork focused on extensibility and usability'
      category: 'Development Tools'
      default: false
      linux:
        install_method: 'apt'
        install_command: 'neovim'
        dependencies:
          - 'git'
          - 'curl'
          - 'fzf'
        post_install:
          - shell: 'git clone https://github.com/LazyVim/starter ~/.config/nvim'
          - shell: 'rm -rf ~/.config/nvim/.git'
          - shell: 'mkdir -p ~/.config/nvim/plugin/after'
          - shell: 'echo "LazyVim starter installed. Plugins will be installed on first nvim startup."'
        config_files:
          - source: '~/.local/share/devex/assets/defaults/neovim/init.vim'
            destination: '~/.config/nvim/init.vim'
          - source: '~/.local/share/devex/assets/defaults/neovim/lazy.toml'
            destination: '~/.config/nvim/lazy.toml'
          - source: '~/.local/share/devex/assets/defaults/neovim/transparency.lua'
            destination: '~/.config/nvim/plugin/after/transparency.lua'
          - source: '~/.local/share/devex/assets/defaults/neovim/lazyvim.json'
            destination: '~/.config/nvim/lazyvim.json'
        themes:
          - name: 'Tokyo Night'
            theme_color: '#1A1B26'
            theme_background: 'dark'
            files:
              - source: '~/.local/share/devex/themes/neovim/tokyo-night.lua'
                destination: '~/.config/nvim/lua/plugins/theme.lua'
              - source: '~/.local/share/devex/themes/gnome/tokyo-night.css'
                destination: '~/.config/gnome-shell/themes/tokyo-night.css'
    - name: ripgrep
      description: 'ripgrep recursively searches directories for a regex pattern while respecting your gitignore'
      category: 'Utilities'
      default: false
      linux:
        install_method: 'apt'
        install_command: 'ripgrep'
        uninstall_command: 'ripgrep'
    - name: 'Ghostty'
      description: 'GPU-accelerated cross-platform terminal emulator with rich features'
      category: 'Terminal Emulators'
      default: false
      desktop_environments: ['all']
      macos:
        install_method: 'brew'
        install_command: 'ghostty'
        uninstall_command: 'ghostty'
        brew_cask: true
        official_support: false
      linux:
        install_method: 'apt'
        install_command: 'ghostty'
        uninstall_command: 'ghostty'
        official_support: false
        alternatives:
          - install_method: 'apk'
            install_command: 'ghostty'
            uninstall_command: 'ghostty'
            official_support: true
            platform_requirements:
              - os: 'alpine'
          - install_method: 'pacman'
            install_command: 'ghostty'
            uninstall_command: 'ghostty'
            official_support: true
            platform_requirements:
              - os: 'arch'
          - install_method: 'yay'
            install_command: 'ghostty-git'
            uninstall_command: 'ghostty-git'
            official_support: true
            platform_requirements:
              - os: 'arch'
          - install_method: 'emerge'
            install_command: 'ghostty'
            uninstall_command: 'ghostty'
            official_support: true
            platform_requirements:
              - os: 'gentoo'
          - install_method: 'nixpkgs'
            install_command: 'ghostty'
            uninstall_command: 'ghostty'
            official_support: true
            platform_requirements:
              - os: 'nixos'
          - install_method: 'nixflake'
            install_command: 'github:ghostty-org/ghostty'
            uninstall_command: 'ghostty'
            official_support: true
            platform_requirements:
              - os: 'nixos'
          - install_method: 'zypper'
            install_command: 'ghostty'
            uninstall_command: 'ghostty'
            official_support: true
            platform_requirements:
              - os: 'opensuse'
          - install_method: 'eopkg'
            install_command: 'ghostty'
            uninstall_command: 'ghostty'
            official_support: true
            platform_requirements:
              - os: 'solus'
          - install_method: 'xbps'
            install_command: 'ghostty'
            uninstall_command: 'ghostty'
            official_support: true
            platform_requirements:
              - os: 'void'
          - install_method: 'apt'
            install_command: 'ghostty'
            uninstall_command: 'ghostty'
            official_support: false
            platform_requirements:
              - os: 'debian'
                version: '12'
              - os: 'ubuntu'
                version: '22.04'
            apt_sources:
              - key_source: 'https://download.opensuse.org/repositories/home:clayrisser:bookworm/Debian_12/Release.key'
                key_name: '/etc/apt/trusted.gpg.d/home_clayrisser_bookworm.gpg'
                source_repo: 'deb http://download.opensuse.org/repositories/home:/clayrisser:/bookworm/Debian_12/ /'
                source_name: '/etc/apt/sources.list.d/home:clayrisser:bookworm.list'
                require_dearmor: true
          - install_method: 'dnf'
            install_command: 'ghostty'
            uninstall_command: 'ghostty'
            official_support: false
            platform_requirements:
              - os: 'fedora'
            pre_install:
              - shell: 'dnf copr enable scottames/ghostty'
          - install_method: 'snap'
            install_command: 'ghostty --classic'
            uninstall_command: 'ghostty'
            official_support: false
          - install_method: 'appimage'
            install_command: 'Ghostty.AppImage'
            uninstall_command: 'Ghostty.AppImage'
            download_url: 'https://github.com/ghostty-appimage/ghostty-appimage/releases/latest'
            destination: '~/Applications/'
            official_support: false
            post_install:
              - shell: 'chmod +x ~/Applications/Ghostty.AppImage'
    - name: Typora
      description: 'A minimal and configurable markdown editor'
      category: 'Text Editors'
      default: false
      linux:
        install_method: 'apt'
        install_command: 'typora'
        apt_sources:
          - key_source: 'https://typora.io/linux/public-key.asc'
            key_name: '/etc/apt/trusted.gpg.d/typora.asc'
            source_repo: 'deb https://typora.io/linux ./'
            source_name: '/etc/apt/sources.list.d/typora.list'
        post_install:
          - command: 'mkdir -p ~/.config/Typora/themes'
        themes:
          - name: 'Standard Theme'
            files:
              - source: '~/.local/share/devex/themes/typora/ia_typora.css'
                destination: '~/.config/Typora/themes/ia_typora.css'
          - name: 'Night Theme'
            files:
              - source: '~/.local/share/devex/themes/typora/ia_typora_night.css'
                destination: '~/.config/Typora/themes/ia_typora_night.css'
    - name: Ulauncher
      description: 'A fast application launcher for Linux'
      category: 'Utility'
      default: false
      desktop_environments: ['all']
      linux:
        install_method: 'apt'
        install_command: 'ulauncher'
        uninstall_command: 'ulauncher'
        official_support: true
        platform_requirements:
          - os: 'ubuntu'
        pre_install:
          - shell: 'add-apt-repository universe -y'
          - shell: 'add-apt-repository ppa:agornostal/ulauncher -y'
          - shell: 'apt update'
        alternatives:
          - install_method: 'deb'
            install_command: 'ulauncher_5.15.7_all.deb'
            uninstall_command: 'ulauncher'
            download_url: 'https://github.com/Ulauncher/Ulauncher/releases/download/5.15.7/ulauncher_5.15.7_all.deb'
            official_support: true
            platform_requirements:
              - os: 'debian'
              - os: 'ubuntu'
          - install_method: 'apt'
            install_command: 'ulauncher'
            uninstall_command: 'ulauncher'
            official_support: true
            platform_requirements:
              - os: 'debian'
            apt_sources:
              - key_source: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0xfaf1020699503176'
                key_name: '/usr/share/keyrings/ulauncher-archive-keyring.gpg'
                source_repo: 'deb [signed-by=/usr/share/keyrings/ulauncher-archive-keyring.gpg] http://ppa.launchpad.net/agornostal/ulauncher/ubuntu jammy main'
                source_name: '/etc/apt/sources.list.d/ulauncher-jammy.list'
                require_dearmor: true
          - install_method: 'yay'
            install_command: 'ulauncher'
            uninstall_command: 'ulauncher'
            official_support: true
            platform_requirements:
              - os: 'arch'
          - install_method: 'makepkg'
            install_command: 'ulauncher'
            uninstall_command: 'ulauncher'
            official_support: true
            platform_requirements:
              - os: 'arch'
            pre_install:
              - shell: 'git clone https://aur.archlinux.org/ulauncher.git'
              - shell: 'cd ulauncher'
            post_install:
              - shell: 'makepkg -is'
          - install_method: 'dnf'
            install_command: 'ulauncher'
            uninstall_command: 'ulauncher'
            official_support: true
            platform_requirements:
              - os: 'fedora'
        config_files:
          - source: '~/.local/share/devex/configs/ulauncher.desktop'
            destination: '~/.config/autostart/ulauncher.desktop'
          - source: '~/.local/share/devex/configs/ulauncher.json'
            destination: '~/.config/ulauncher/settings.json'
        post_install:
          - shell: 'gtk-launch ulauncher.desktop'
          - sleep: 2
    - name: wget
      description: 'A tool for retrieving files from the web'
      category: 'dependency'
      linux:
        install_method: 'apt'
        install_command: 'wget'
    - name: zsh
      description: 'A powerful shell with many features'
      category: 'System Utilities'
      default: false
      linux:
        install_method: 'apt'
        install_command: 'zsh'
    - name: Fastfetch
      description: 'A maintained, feature-rich and performance-oriented, neofetch-like system information tool.'
      category: 'System Utilities'
      default: false
      desktop_environments: ['all']
      macos:
        install_method: 'brew'
        install_command: 'fastfetch'
        uninstall_command: 'fastfetch'
        official_support: true
        config_files:
          - source: '~/.local/share/devex/assets/defaults/fastfetch/fastfetch.jsonc'
            destination: '~/.config/fastfetch/config.jsonc'
        alternatives:
          - install_method: 'macports'
            install_command: 'fastfetch'
            uninstall_command: 'fastfetch'
            official_support: true
      windows:
        install_method: 'winget'
        install_command: 'fastfetch'
        uninstall_command: 'fastfetch'
        official_support: true
        alternatives:
          - install_method: 'scoop'
            install_command: 'fastfetch'
            uninstall_command: 'fastfetch'
            official_support: true
          - install_method: 'chocolatey'
            install_command: 'fastfetch'
            uninstall_command: 'fastfetch'
            official_support: true
      linux:
        install_method: 'deb'
        install_command: 'fastfetch'
        uninstall_command: 'fastfetch'
        download_url: 'https://github.com/fastfetch-cli/fastfetch/releases/latest/download/fastfetch-linux-%ARCHITECTURE%.deb'
        official_support: true
        platform_requirements:
          - os: 'debian'
            version: '11+'
          - os: 'ubuntu'
            version: '20.04+'
        config_files:
          - source: '~/.local/share/devex/assets/defaults/fastfetch/fastfetch.jsonc'
            destination: '~/.config/fastfetch/config.jsonc'
        post_install:
          - shell: 'export PATH=$PATH:/usr/bin:/usr/local/bin && hash -r'
        alternatives:
          - install_method: 'apt'
            install_command: 'fastfetch'
            uninstall_command: 'fastfetch'
            official_support: true
            platform_requirements:
              - os: 'debian'
                version: '13+'
          - install_method: 'pacman'
            install_command: 'fastfetch'
            uninstall_command: 'fastfetch'
            official_support: true
            platform_requirements:
              - os: 'arch'
          - install_method: 'dnf'
            install_command: 'fastfetch'
            uninstall_command: 'fastfetch'
            official_support: true
            platform_requirements:
              - os: 'fedora'
          - install_method: 'emerge'
            install_command: 'fastfetch'
            uninstall_command: 'fastfetch'
            official_support: true
            platform_requirements:
              - os: 'gentoo'
          - install_method: 'apk'
            install_command: 'fastfetch'
            uninstall_command: 'fastfetch'
            official_support: true
            platform_requirements:
              - os: 'alpine'
          - install_method: 'nixpkgs'
            install_command: 'fastfetch'
            uninstall_command: 'fastfetch'
            official_support: true
