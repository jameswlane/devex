# Desktop Environment Compatibility Guide:
# - Use 'desktop_environments' field to specify which desktop environments an app supports
# - Available values: 'gnome', 'kde', 'xfce', 'cinnamon', 'unity', 'gnome-family', 'all'
# - 'gnome-family' includes: gnome, unity, cinnamon
# - 'all' means compatible with any desktop environment
# - If field is omitted, app is assumed compatible with all environments
# - Examples:
#   desktop_environments: ['gnome']           # GNOME-only app (GNOME Tweaks)
#   desktop_environments: ['kde']             # KDE-only app (Dolphin File Manager)
#   desktop_environments: ['kde', 'gnome']    # Works well with both KDE and GNOME
#   desktop_environments: ['gnome-family']   # Works with GNOME-based DEs
#   desktop_environments: ['all']            # Universal compatibility
applications:
  development:
    - name: bat
      description: 'A cat(1) clone with wings'
      category: 'Utilities'
      default: false
      linux:
        install_method: 'apt'
        install_command: 'bat'
        uninstall_command: 'bat'
    - name: btop
      description: 'A resource monitor that shows usage and stats for processor, memory, disks, network and processes'
      category: 'System Monitoring'
      default: false
      desktop_environments: ['all']
      linux:
        install_method: 'apt'
        install_command: 'btop'
        uninstall_command: 'btop'
        official_support: true
        config_files:
          - source: '~/.local/share/devex/assets/defaults/btop/btop.conf'
            destination: '~/.config/btop/btop.conf'
          - source: '~/.local/share/devex/assets/themes/btop/tokyo-night/btop.theme'
            destination: '~/.config/btop/themes/tokyo-night.theme'
        alternatives:
          - install_method: 'dnf'
            install_command: 'btop'
            uninstall_command: 'btop'
            official_support: true
            platform_requirements:
              - os: 'fedora'
          - install_method: 'dnf'
            install_command: 'btop'
            uninstall_command: 'btop'
            official_support: true
            platform_requirements:
              - os: 'rhel'
              - os: 'rocky'
              - os: 'almalinux'
            pre_install:
              - shell: 'dnf install -y epel-release'
          - install_method: 'zypper'
            install_command: 'btop'
            uninstall_command: 'btop'
            official_support: true
            platform_requirements:
              - os: 'opensuse-tumbleweed'
          - install_method: 'snap'
            install_command: 'btop'
            uninstall_command: 'btop'
            official_support: true
            post_install:
              - shell: 'snap connect btop:removable-media'
          - install_method: 'snap'
            install_command: 'btop-desktop'
            uninstall_command: 'btop-desktop'
            official_support: true
            post_install:
              - shell: 'snap connect btop-desktop:removable-media'
      macos:
        install_method: 'brew'
        install_command: 'btop'
        uninstall_command: 'btop'
        official_support: true
        config_files:
          - source: '~/.local/share/devex/assets/defaults/btop/btop.conf'
            destination: '~/.config/btop/btop.conf'
          - source: '~/.local/share/devex/assets/themes/btop/tokyo-night/btop.theme'
            destination: '~/.config/btop/themes/tokyo-night.theme'
      freebsd:
        install_method: 'pkg'
        install_command: 'btop'
        uninstall_command: 'btop'
        official_support: true
      netbsd:
        install_method: 'pkg_add'
        install_command: 'btop'
        uninstall_command: 'btop'
        official_support: true
    - name: ca-certificates
      description: 'Common CA certificates'
      category: 'Dependency'
      linux:
        install_method: 'apt'
        install_command: 'ca-certificates'
    - name: Build Essential
      description: 'Essential development tools and libraries for building software'
      category: 'Development Tools'
      default: false
      desktop_environments: ['all']
      macos:
        install_method: 'brew'
        install_command: 'autoconf bison clang pkg-config openssl readline zlib libyaml ncurses libffi gdbm jemalloc vips imagemagick mupdf redis sqlite mysql-client postgresql'
        uninstall_command: 'autoconf bison clang pkg-config openssl readline zlib libyaml ncurses libffi gdbm jemalloc vips imagemagick mupdf redis sqlite mysql-client postgresql'
        official_support: true
        pre_install:
          - shell: 'xcode-select --install || true'
        alternatives:
          - install_method: 'macports'
            install_command: 'autoconf bison clang pkgconfig openssl readline zlib libyaml ncurses libffi gdbm jemalloc vips ImageMagick mupdf redis3 sqlite3 mysql8 postgresql16'
            uninstall_command: 'autoconf bison clang pkgconfig openssl readline zlib libyaml ncurses libffi gdbm jemalloc vips ImageMagick mupdf redis3 sqlite3 mysql8 postgresql16'
            official_support: true
            pre_install:
              - shell: 'sudo port selfupdate'
      windows:
        install_method: 'chocolatey'
        install_command: 'visualstudio2022buildtools visualstudio2022-workload-vctools pkgconfiglite openssl zlib sqlite mysql.utilities postgresql redis-64'
        uninstall_command: 'visualstudio2022buildtools visualstudio2022-workload-vctools pkgconfiglite openssl zlib sqlite mysql.utilities postgresql redis-64'
        official_support: true
        alternatives:
          - install_method: 'winget'
            install_command: 'Microsoft.VisualStudio.2022.BuildTools'
            uninstall_command: 'Microsoft.VisualStudio.2022.BuildTools'
            official_support: true
            post_install:
              - shell: 'winget install Git.Git'
              - shell: 'winget install OpenJS.NodeJS'
              - shell: 'winget install Python.Python.3.11'
          - install_method: 'scoop'
            install_command: 'gcc make cmake pkg-config openssl sqlite postgresql redis'
            uninstall_command: 'gcc make cmake pkg-config openssl sqlite postgresql redis'
            official_support: false
            pre_install:
              - shell: 'scoop bucket add main'
              - shell: 'scoop bucket add extras'
      linux:
        install_method: 'apt'
        install_command: 'build-essential pkg-config autoconf bison clang rustc libssl-dev libreadline-dev zlib1g-dev libyaml-dev libncurses5-dev libffi-dev libgdbm-dev libjemalloc2 libvips-dev imagemagick libmagickwand-dev mupdf mupdf-tools gir1.2-gtop-2.0 gir1.2-clutter-1.0 redis-tools sqlite3 libsqlite3-0 libmysqlclient-dev libpq-dev postgresql-client postgresql-client-common'
        uninstall_command: 'build-essential pkg-config autoconf bison clang rustc libssl-dev libreadline-dev zlib1g-dev libyaml-dev libncurses5-dev libffi-dev libgdbm-dev libjemalloc2 libvips-dev imagemagick libmagickwand-dev mupdf mupdf-tools gir1.2-gtop-2.0 gir1.2-clutter-1.0 redis-tools sqlite3 libsqlite3-0 libmysqlclient-dev libpq-dev postgresql-client postgresql-client-common'
        official_support: true
        platform_requirements:
          - os: 'debian'
          - os: 'ubuntu'
        alternatives:
          - install_method: 'dnf'
            install_command: '@development-tools pkg-config autoconf bison clang rust openssl-devel readline-devel zlib-devel libyaml-devel ncurses-devel libffi-devel gdbm-devel jemalloc-devel vips-devel ImageMagick-devel mupdf-devel redis sqlite-devel mysql-devel postgresql-devel'
            uninstall_command: '@development-tools pkg-config autoconf bison clang rust openssl-devel readline-devel zlib-devel libyaml-devel ncurses-devel libffi-devel gdbm-devel jemalloc-devel vips-devel ImageMagick-devel mupdf-devel redis sqlite-devel mysql-devel postgresql-devel'
            official_support: true
            platform_requirements:
              - os: 'fedora'
              - os: 'centos'
                version: '8+'
              - os: 'rhel'
                version: '8+'
              - os: 'amazonlinux'
                version: '2+'
            pre_install:
              - shell: 'dnf groupinstall -y "Development Tools"'
          - install_method: 'pacman'
            install_command: 'base-devel pkgconf autoconf bison clang rust openssl readline zlib libyaml ncurses libffi gdbm jemalloc libvips imagemagick mupdf redis sqlite mysql postgresql'
            uninstall_command: 'base-devel pkgconf autoconf bison clang rust openssl readline zlib libyaml ncurses libffi gdbm jemalloc libvips imagemagick mupdf redis sqlite mysql postgresql'
            official_support: true
            platform_requirements:
              - os: 'arch'
              - os: 'manjaro'
          - install_method: 'zypper'
            install_command: 'patterns-devel-base-devel_basis pkg-config autoconf bison clang rust libopenssl-devel readline-devel zlib-devel libyaml-devel ncurses-devel libffi-devel gdbm-devel jemalloc-devel libvips-devel ImageMagick-devel mupdf redis sqlite3-devel libmysqlclient-devel postgresql-devel'
            uninstall_command: 'patterns-devel-base-devel_basis pkg-config autoconf bison clang rust libopenssl-devel readline-devel zlib-devel libyaml-devel ncurses-devel libffi-devel gdbm-devel jemalloc-devel libvips-devel ImageMagick-devel mupdf redis sqlite3-devel libmysqlclient-devel postgresql-devel'
            official_support: true
            platform_requirements:
              - os: 'opensuse'
              - os: 'suse'
          - install_method: 'emerge'
            install_command: 'sys-devel/autoconf sys-devel/bison sys-devel/clang dev-lang/rust dev-libs/openssl sys-libs/readline sys-libs/zlib dev-libs/libyaml sys-libs/ncurses dev-libs/libffi sys-libs/gdbm dev-libs/jemalloc media-libs/vips media-gfx/imagemagick app-text/mupdf dev-db/redis dev-db/sqlite dev-db/mysql dev-db/postgresql'
            uninstall_command: 'sys-devel/autoconf sys-devel/bison sys-devel/clang dev-lang/rust dev-libs/openssl sys-libs/readline sys-libs/zlib dev-libs/libyaml sys-libs/ncurses dev-libs/libffi sys-libs/gdbm dev-libs/jemalloc media-libs/vips media-gfx/imagemagick app-text/mupdf dev-db/redis dev-db/sqlite dev-db/mysql dev-db/postgresql'
            official_support: true
            platform_requirements:
              - os: 'gentoo'
          - install_method: 'eopkg'
            install_command: 'system.devel autoconf bison clang rust openssl-devel readline-devel zlib-devel libyaml-devel ncurses-devel libffi-devel gdbm-devel jemalloc-devel vips-devel imagemagick-devel mupdf-devel redis sqlite3-devel mysql-devel postgresql-devel'
            uninstall_command: 'system.devel autoconf bison clang rust openssl-devel readline-devel zlib-devel libyaml-devel ncurses-devel libffi-devel gdbm-devel jemalloc-devel vips-devel imagemagick-devel mupdf-devel redis sqlite3-devel mysql-devel postgresql-devel'
            official_support: true
            platform_requirements:
              - os: 'solus'
          - install_method: 'xbps'
            install_command: 'base-devel pkg-config autoconf bison clang rust openssl-devel readline-devel zlib-devel libyaml-devel ncurses-devel libffi-devel gdbm-devel jemalloc-devel vips-devel ImageMagick-devel mupdf redis sqlite-devel mysql-devel postgresql-libs'
            uninstall_command: 'base-devel pkg-config autoconf bison clang rust openssl-devel readline-devel zlib-devel libyaml-devel ncurses-devel libffi-devel gdbm-devel jemalloc-devel vips-devel ImageMagick-devel mupdf redis sqlite-devel mysql-devel postgresql-libs'
            official_support: true
            platform_requirements:
              - os: 'void'
          - install_method: 'apk'
            install_command: 'build-base pkgconfig autoconf bison clang rust openssl-dev readline-dev zlib-dev yaml-dev ncurses-dev libffi-dev gdbm-dev jemalloc-dev vips-dev imagemagick-dev mupdf-dev redis sqlite-dev mysql-dev postgresql-dev'
            uninstall_command: 'build-base pkgconfig autoconf bison clang rust openssl-dev readline-dev zlib-dev yaml-dev ncurses-dev libffi-dev gdbm-dev jemalloc-dev vips-dev imagemagick-dev mupdf-dev redis sqlite-dev mysql-dev postgresql-dev'
            official_support: true
            platform_requirements:
              - os: 'alpine'
          - install_method: 'nixpkgs'
            install_command: 'gcc gnumake cmake pkg-config autoconf bison clang rustc openssl readline zlib libyaml ncurses libffi gdbm jemalloc vips imagemagick mupdf redis sqlite mysql80 postgresql'
            uninstall_command: 'gcc gnumake cmake pkg-config autoconf bison clang rustc openssl readline zlib libyaml ncurses libffi gdbm jemalloc vips imagemagick mupdf redis sqlite mysql80 postgresql'
            official_support: true
            platform_requirements:
              - os: 'nixos'
      freebsd:
        install_method: 'pkg'
        install_command: 'autotools bison clang rust openssl readline ncurses libffi gdbm jemalloc vips ImageMagick mupdf redis sqlite3 mysql80-client postgresql16-client'
        uninstall_command: 'autotools bison clang rust openssl readline ncurses libffi gdbm jemalloc vips ImageMagick mupdf redis sqlite3 mysql80-client postgresql16-client'
        official_support: true
        alternatives:
          - install_method: 'ports'
            install_command: 'build-essential'
            uninstall_command: 'build-essential'
            official_support: true
            pre_install:
              - shell: 'cd /usr/ports/devel && make install clean'
      openbsd:
        install_method: 'pkg_add'
        install_command: 'autoconf bison clang rust libressl readline ncurses libffi gdbm jemalloc vips ImageMagick mupdf redis sqlite3 mysql-client postgresql-client'
        uninstall_command: 'autoconf bison clang rust libressl readline ncurses libffi gdbm jemalloc vips ImageMagick mupdf redis sqlite3 mysql-client postgresql-client'
        official_support: true
      system_requirements:
        min_memory_mb: 2048
        min_disk_space_mb: 5120
        required_commands: ['make', 'gcc']
    - name: curl
      description: 'A tool to transfer data from or to a server'
      category: 'dependency'
      linux:
        install_method: 'apt'
        install_command: 'curl'
    - name: Eza
      description: 'A modern alternative to ls'
      category: 'System Utilities'
      default: true
      desktop_environments: ['all']
      macos:
        install_method: 'brew'
        install_command: 'eza'
        uninstall_command: 'eza'
        official_support: true
      windows:
        install_method: 'winget'
        install_command: 'eza-community.eza'
        uninstall_command: 'eza-community.eza'
        official_support: true
        alternatives:
          - install_method: 'scoop'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
          - install_method: 'cargo'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
      linux:
        install_method: 'apt'
        install_command: 'eza'
        uninstall_command: 'eza'
        official_support: true
        apt_sources:
          - key_source: 'https://raw.githubusercontent.com/eza-community/eza/main/deb.asc'
            key_name: '/etc/apt/keyrings/gierens.gpg'
            source_repo: 'deb [signed-by=/etc/apt/keyrings/gierens.gpg] http://deb.gierens.de stable main'
            source_name: '/etc/apt/sources.list.d/gierens.list'
            require_dearmor: true
        platform_requirements:
          - os: 'debian'
            dependencies:
              - 'curl'
              - 'gpg'
          - os: 'ubuntu'
            dependencies:
              - 'curl'
              - 'gpg'
        alternatives:
          - install_method: 'pacman'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'arch'
          - install_method: 'dnf'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'fedora'
          - install_method: 'zypper'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'opensuse'
          - install_method: 'emerge'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'gentoo'
          - install_method: 'xbps'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'void'
          - install_method: 'pkg'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'freebsd'
          - install_method: 'pkg_add'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'openbsd'
          - install_method: 'nixpkgs'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
            platform_requirements:
              - os: 'nixos'
          - install_method: 'cargo'
            install_command: 'eza'
            uninstall_command: 'eza'
            official_support: true
    - name: fzf
      description: 'A command-line fuzzy finder'
      category: 'Utilities'
      default: false
      linux:
        install_method: 'apt'
        install_command: 'fzf'
        uninstall_command: 'fzf'
    - name: git
      description: 'A distributed version control system'
      category: 'Dependency'
      linux:
        install_method: 'apt'
        install_command: 'git'
    - name: GitHub CLI
      description: 'GitHub official command line tool'
      category: 'Development Tools'
      default: true
      desktop_environments: ['all']
      macos:
        install_method: 'brew'
        install_command: 'gh'
        uninstall_command: 'gh'
        official_support: true
        alternatives:
          - install_method: 'macports'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
      windows:
        install_method: 'winget'
        install_command: 'GitHub.cli'
        uninstall_command: 'GitHub.cli'
        official_support: true
        alternatives:
          - install_method: 'chocolatey'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
          - install_method: 'scoop'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
      linux:
        install_method: 'apt'
        install_command: 'gh'
        uninstall_command: 'gh'
        official_support: true
        apt_sources:
          - key_source: 'https://cli.github.com/packages/githubcli-archive-keyring.gpg'
            key_name: '/etc/apt/keyrings/githubcli-archive-keyring.gpg'
            key_fingerprint: '23F3D4EA75716F8B2E1A5E1A50F32B5B1B4A2C1C'
            source_repo: 'deb [arch=%ARCHITECTURE% signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main'
            source_name: '/etc/apt/sources.list.d/github-cli.list'
        platform_requirements:
          - os: 'debian'
            dependencies:
              - 'curl'
              - 'gnupg'
          - os: 'ubuntu'
            dependencies:
              - 'curl'
              - 'gnupg'
        alternatives:
          - install_method: 'dnf'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: true
            platform_requirements:
              - os: 'fedora'
              - version: '41+'
            pre_install:
              - shell: 'dnf install dnf5-plugins'
              - shell: 'dnf config-manager addrepo --from-repofile=https://cli.github.com/packages/rpm/gh-cli.repo'
          - install_method: 'dnf'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: true
            platform_requirements:
              - os: 'rhel'
                version: '9+'
              - os: 'centos'
                version: '9+'
            pre_install:
              - shell: "dnf install 'dnf-command(config-manager)'"
              - shell: 'dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo'
          - install_method: 'yum'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: true
            platform_requirements:
              - os: 'amazonlinux'
                version: '2'
            pre_install:
              - shell: 'type -p yum-config-manager >/dev/null || yum install yum-utils'
              - shell: 'yum-config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo'
          - install_method: 'zypper'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: true
            platform_requirements:
              - os: 'opensuse'
              - os: 'suse'
            pre_install:
              - shell: 'zypper addrepo https://cli.github.com/packages/rpm/gh-cli.repo'
              - shell: 'zypper ref'
          - install_method: 'pacman'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'arch'
          - install_method: 'emerge'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'gentoo'
          - install_method: 'xbps'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'void'
          - install_method: 'pkg'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
            platform_requirements:
              - os: 'freebsd'
          - install_method: 'pkg_add'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'openbsd'
          - install_method: 'nixpkgs'
            install_command: 'gh'
            uninstall_command: 'gh'
            official_support: false
            platform_requirements:
              - os: 'nixos'
          - install_method: 'apk'
            install_command: 'github-cli'
            uninstall_command: 'github-cli'
            official_support: false
            platform_requirements:
              - os: 'alpine'
    - name: LazyGit
      description: 'A simple terminal UI for git commands'
      category: 'Development Tools'
      default: false
      desktop_environments: ['all']
      macos:
        install_method: 'brew'
        install_command: 'lazygit'
        uninstall_command: 'lazygit'
        official_support: true
        alternatives:
          - install_method: 'macports'
            install_command: 'lazygit'
            uninstall_command: 'lazygit'
            official_support: true
            pre_install:
              - shell: 'sudo port install lazygit'
      windows:
        install_method: 'winget'
        install_command: 'JesseDuffield.lazygit'
        uninstall_command: 'JesseDuffield.lazygit'
        official_support: true
        alternatives:
          - install_method: 'chocolatey'
            install_command: 'lazygit'
            uninstall_command: 'lazygit'
            official_support: true
          - install_method: 'scoop'
            install_command: 'lazygit'
            uninstall_command: 'lazygit'
            official_support: true
            pre_install:
              - shell: 'scoop bucket add extras'
      linux:
        install_method: 'curlpipe'
        download_url: 'https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_*_Linux_x86_64.tar.gz'
        destination: '/usr/local/bin'
        official_support: true
        pre_install:
          - shell: 'LAZYGIT_VERSION=$(curl -s "https://api.github.com/repos/jesseduffield/lazygit/releases/latest" | grep -Po ''"tag_name": *"v\K[^"]*'')'
          - shell: 'curl -Lo lazygit.tar.gz "https://github.com/jesseduffield/lazygit/releases/download/v${LAZYGIT_VERSION}/lazygit_${LAZYGIT_VERSION}_Linux_x86_64.tar.gz"'
          - shell: 'tar xf lazygit.tar.gz lazygit'
        post_install:
          - shell: 'sudo install lazygit -D -t /usr/local/bin/ && rm -f lazygit.tar.gz lazygit'
        alternatives:
          - install_method: 'apt'
            install_command: 'lazygit'
            uninstall_command: 'lazygit'
            official_support: true
            platform_requirements:
              - os: 'debian'
                version: '13+'
              - os: 'ubuntu'
                version: '25.10+'
          - install_method: 'dnf'
            install_command: 'lazygit'
            uninstall_command: 'lazygit'
            official_support: true
            platform_requirements:
              - os: 'fedora'
              - os: 'amazonlinux'
                version: '2023+'
              - os: 'centos'
                version: '9+'
            pre_install:
              - shell: 'sudo dnf copr enable dejan/lazygit'
          - install_method: 'pacman'
            install_command: 'lazygit'
            uninstall_command: 'lazygit'
            official_support: true
            platform_requirements:
              - os: 'arch'
              - os: 'manjaro'
          - install_method: 'zypper'
            install_command: 'lazygit'
            uninstall_command: 'lazygit'
