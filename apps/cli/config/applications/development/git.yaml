name: git
description: 'Distributed version control system'
category: 'Development'
default: true
desktop_environments: ['all']
linux:
  install_method: 'apt'
  install_command: 'git'
  uninstall_command: 'git'
  official_support: true
  platform_requirements:
    - os: 'debian'
    - os: 'ubuntu'
  alternatives:
    - install_method: 'dnf'
      install_command: 'git'
      uninstall_command: 'git'
      official_support: true
      platform_requirements:
        - os: 'fedora'
        - os: 'rhel'
        - os: 'centos'
    - install_method: 'pacman'
      install_command: 'git'
      uninstall_command: 'git'
      official_support: true
      platform_requirements:
        - os: 'arch'
        - os: 'manjaro'
macos:
  install_method: 'brew'
  install_command: 'git'
  uninstall_command: 'git'
  official_support: true
windows:
  install_method: 'winget'
  install_command: 'Git.Git'
  uninstall_command: 'Git.Git'
  official_support: true
