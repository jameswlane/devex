# Optional Desktop Applications Configuration
# Desktop/GUI applications that can be optionally installed
desktop_optional_applications:
  communication:
    - name: 'Proton Mail'
      description: 'Secure email app by Proton'
      category: 'Optional Apps'
      desktop_environments: ['all']
      linux:
        install_method: 'deb'
        install_command: 'wget https://proton.me/download/mail/linux/1.2.4/ProtonMail-desktop-beta.deb && sudo apt install ./ProtonMail-desktop-beta.deb'
        uninstall_command: 'sudo apt remove protonmail-desktop-beta'
        dependencies:
          - 'apt'
    - name: 'Proton VPN'
      description: 'VPN service by Proton'
      category: 'Optional Apps'
      desktop_environments: ['gnome-family']
      linux:
        install_method: 'script'
        install_command: |
          wget https://repo.protonvpn.com/debian/dists/stable/main/binary-all/protonvpn-stable-release_1.0.4_all.deb &&
          sudo dpkg -i ./protonvpn-stable-release_1.0.4_all.deb && sudo apt update &&
          sudo apt install proton-vpn-gnome-desktop libayatana-appindicator3-1 gir1.2-ayatanaappindicator3-0.1 gnome-shell-extension-appindicator
        uninstall_command: 'sudo apt remove proton-vpn-gnome-desktop libayatana-appindicator3-1 gir1.2-ayatanaappindicator3-0.1 gnome-shell-extension-appindicator'
        dependencies:
          - 'apt'
  productivity:
    - name: 'Proton Pass'
      description: 'Password manager by Proton'
      category: 'Optional Apps'
      desktop_environments: ['all']
      linux:
        install_method: 'deb'
        install_command: 'wget https://proton.me/download/pass/linux/proton-pass_1.23.1_amd64.deb && sudo apt install ./proton-pass_1.23.1_amd64.deb'
        uninstall_command: 'sudo apt remove proton-pass'
        dependencies:
          - 'apt'
  system:
    - name: 'GNOME Tweaks'
      description: 'Advanced GNOME 3 settings'
      category: 'Optional Apps'
      desktop_environments: ['gnome']
      linux:
        install_method: 'apt'
        install_command: 'gnome-tweaks'
        uninstall_command: 'gnome-tweaks'
    - name: 'GNOME Extensions'
      description: 'Browser extension for managing GNOME Shell extensions'
      category: 'Optional Apps'
      desktop_environments: ['gnome']
      linux:
        install_method: 'apt'
        install_command: 'chrome-gnome-shell'
        uninstall_command: 'chrome-gnome-shell'
    - name: 'KDE Connect'
      description: 'Integrate Android/iOS devices with your desktop'
      category: 'Optional Apps'
      desktop_environments: ['kde', 'gnome', 'xfce']
      linux:
        install_method: 'apt'
        install_command: 'kdeconnect'
        uninstall_command: 'kdeconnect'
    - name: 'Dolphin File Manager'
      description: 'KDE file manager'
      category: 'Optional Apps'
      desktop_environments: ['kde']
      linux:
        install_method: 'apt'
        install_command: 'dolphin'
        uninstall_command: 'dolphin'
  browsers:
    - name: 'Zen Browser'
      description: 'A secure and private browser'
      category: 'Optional Apps'
      desktop_environments: ['all']
      linux:
        install_method: 'flatpak'
        install_command: 'flatpak install flathub io.github.zen_browser.zen'
        uninstall_command: 'flatpak remove io.github.zen_browser.zen'
        dependencies:
          - 'flatpak'
  utilities:
    - name: Ulauncher
      description: 'A fast application launcher for Linux'
      category: 'Utility'
      default: false
      desktop_environments: ['all']
      linux:
        install_method: 'apt'
        install_command: 'ulauncher'
        uninstall_command: 'ulauncher'
        official_support: true
        platform_requirements:
          - os: 'ubuntu'
        pre_install:
          - shell: 'add-apt-repository universe -y'
          - shell: 'add-apt-repository ppa:agornostal/ulauncher -y'
          - shell: 'apt update'
        alternatives:
          - install_method: 'deb'
            install_command: 'ulauncher_5.15.7_all.deb'
            uninstall_command: 'ulauncher'
            download_url: 'https://github.com/Ulauncher/Ulauncher/releases/download/5.15.7/ulauncher_5.15.7_all.deb'
            official_support: true
            platform_requirements:
              - os: 'debian'
              - os: 'ubuntu'
          - install_method: 'apt'
            install_command: 'ulauncher'
            uninstall_command: 'ulauncher'
            official_support: true
            platform_requirements:
              - os: 'debian'
            apt_sources:
              - key_source: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0xfaf1020699503176'
                key_name: '/usr/share/keyrings/ulauncher-archive-keyring.gpg'
                source_repo: 'deb [signed-by=/usr/share/keyrings/ulauncher-archive-keyring.gpg] http://ppa.launchpad.net/agornostal/ulauncher/ubuntu jammy main'
                source_name: '/etc/apt/sources.list.d/ulauncher-jammy.list'
                require_dearmor: true
          - install_method: 'yay'
            install_command: 'ulauncher'
            uninstall_command: 'ulauncher'
            official_support: true
            platform_requirements:
              - os: 'arch'
          - install_method: 'makepkg'
            install_command: 'ulauncher'
            uninstall_command: 'ulauncher'
            official_support: true
            platform_requirements:
              - os: 'arch'
            pre_install:
              - shell: 'git clone https://aur.archlinux.org/ulauncher.git'
              - shell: 'cd ulauncher'
            post_install:
              - shell: 'makepkg -is'
          - install_method: 'dnf'
            install_command: 'ulauncher'
            uninstall_command: 'ulauncher'
            official_support: true
            platform_requirements:
              - os: 'fedora'
        config_files:
          - source: '~/.local/share/devex/configs/ulauncher.desktop'
            destination: '~/.config/autostart/ulauncher.desktop'
          - source: '~/.local/share/devex/configs/ulauncher.json'
            destination: '~/.config/ulauncher/settings.json'
        post_install:
          - shell: 'gtk-launch ulauncher.desktop'
          - sleep: 2
