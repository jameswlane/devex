version: "2"
run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - ineffassign
    - misspell
    - noctx
    - paralleltest
    - prealloc
    - staticcheck
    - thelper
    - tparallel
    - unparam
    - unused
linters-settings:
  gofmt:
    rewrite-rules:
      - pattern: 'interface{}'
        replacement: 'any'
  misspell:
    locale: US
formatters:
  settings:
    goimports:
      local-prefixes:
        - github.com/jameswlane/devex
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
