pre-commit:
  parallel: false
  commands:
    check-large-files:
      run: |
        git diff --cached --name-only | \
          xargs -I {} find {} -size +10M 2>/dev/null | \
          head -1 | grep -q . && echo "Large files detected" && exit 1 || exit 0
      stage_fixed: true
    yamlfmt:
      glob: "*.{yml,yaml}"
      run: yamlfmt {staged_files}
      stage_fixed: true
    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint {staged_files}
    end-of-file-fixer:
      glob: '*.{js,ts,jsx,tsx,go,md,yml,yaml,json}'
      run: |
        for file in {staged_files}; do
          if [ -s "$file" ] && [ "$(tail -c1 "$file")" != "" ]; then
            echo "" >> "$file"
          fi
        done
      stage_fixed: true
    biome:
      glob: '*.{json}'
      run: pnpm exec biome check --write {staged_files}
      stage_fixed: true
    go-fmt:
      root: 'apps/cli/'
      glob: '*.go'
      run: gofmt -w {staged_files}
      stage_fixed: true
    go-imports:
      root: 'apps/cli/'
      glob: '*.go'
      run: goimports -w {staged_files}
      stage_fixed: true
    go-lint:
      root: 'apps/cli/'
      glob: '*.go'
      run: golangci-lint run --fix
      stage_fixed: true
    plugin-go-fmt:
      root: 'packages/'
      glob: '**/*.go'
      run: |
        for file in {staged_files}; do
          plugin_dir=$(dirname "$file")
          if [[ "$plugin_dir" != *"plugin-sdk"* ]] && [[ "$plugin_dir" != *"apps"* ]]; then
            echo "Formatting Go files in $plugin_dir"
            (cd "$plugin_dir" && gofmt -w *.go 2>/dev/null && goimports -w *.go 2>/dev/null)
          fi
        done
      stage_fixed: true
    plugin-go-mod-tidy:
      root: 'packages/'
      glob: '{**/go.mod,**/main.go}'
      run: |
        for file in {staged_files}; do
          plugin_dir=$(dirname "$file")
          if [ -f "$plugin_dir/go.mod" ] && [[ "$plugin_dir" != *"apps"* ]]; then
            echo "Updating dependencies for $plugin_dir"
            (cd "$plugin_dir" && go mod tidy)
          fi
        done
      stage_fixed: true
    plugin-package-json-check:
      root: 'packages/'
      glob: '**/package.json'
      run: |
        for file in {staged_files}; do
          # Skip root package.json and app package.json files
          if [[ "$file" != "package.json" ]] && [[ "$file" != *"apps/"* ]]; then
            echo "Validating package.json: $file"
            if ! jq empty "$file" >/dev/null 2>&1; then
              echo "❌ Invalid JSON in $file"
              exit 1
            fi
            # Check required fields for plugin packages
            if [[ "$file" == *"packages/"* ]] && [[ "$file" != *"plugin-sdk"* ]]; then
              if ! jq -e '.name and .version and .description' "$file" >/dev/null; then
                echo "❌ Missing required fields (name, version, description) in $file"
                exit 1
              fi
            fi
          fi
        done
    biome-web:
      root: 'apps/web/'
      glob: '*.{js,ts,jsx,tsx}'
      run: pnpm exec biome check --write {staged_files}
      stage_fixed: true
    biome-docs:
      root: 'apps/docs/'
      glob: '*.{js,ts,jsx,tsx}'
      run: pnpm exec biome check --write {staged_files}
      stage_fixed: true
    turborepo-build-changed:
      run: |
        echo "🔨 Building changed packages with Turborepo..."
        pnpm build --filter="...[HEAD~1]"
      stage_fixed: true
    turborepo-lint-changed:
      run: |
        echo "🧹 Linting changed packages with Turborepo..."
        pnpm lint --filter="...[HEAD~1]"
      stage_fixed: true
commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit $1
post-commit:
  commands:
    package-status:
      run: |
        # Check if any package files were modified in the last commit
        if git diff --name-only HEAD~1 HEAD | grep -q "^packages/"; then
          echo ""
          echo "🔧 Package changes detected in your commit!"
          echo "📋 Run 'pnpm build --filter=\"...[HEAD~1]\"' to build changed packages"
          echo "🧹 Run 'pnpm lint --filter=\"...[HEAD~1]\"' to lint changed packages"
          echo "🧪 Run 'pnpm test --filter=\"...[HEAD~1]\"' to test changed packages"
          echo ""
        fi
pre-push:
  parallel: true
  commands:
    turborepo-build:
      run: pnpm build
    turborepo-lint:
      run: pnpm lint
    turborepo-test:
      run: pnpm test
    go-vulncheck:
      root: 'apps/cli/'
      run: govulncheck ./...
commands: &commands
  turborepo-lint-cli:
    run: pnpm lint --filter=cli
  turborepo-test-cli:
    run: pnpm test --filter=cli
  format-all:
    run: pnpm exec biome check --write .
  lint-web:
    root: 'apps/web/'
    run: pnpm exec biome check --write .
  lint-docs:
    root: 'apps/docs/'
    run: pnpm exec biome check --write .
  format-yaml:
    run: yamlfmt .
  lint-yaml:
    run: yamllint .
  # Turborepo Development Commands
  # ==============================
  turborepo-build-all:
    run: pnpm build
  turborepo-build-changed:
    run: pnpm build --filter="...[HEAD~1]"
  turborepo-lint-all:
    run: pnpm lint
  turborepo-lint-changed:
    run: pnpm lint --filter="...[HEAD~1]"
  turborepo-test-all:
    run: pnpm test
  turborepo-test-changed:
    run: pnpm test --filter="...[HEAD~1]"
  package-status:
    run: |
      echo "📦 Package Status:"
      echo "Build all: pnpm build"
      echo "Build changed: pnpm build --filter=\"...[HEAD~1]\""
      echo "Test all: pnpm test"
      echo "Lint all: pnpm lint"
  package-tidy-all:
    run: |
      echo "🧹 Running go mod tidy on all packages..."
      find packages -name go.mod -not -path "*/node_modules/*" -execdir go mod tidy \;
  package-format-all:
    run: |
      echo "🎨 Formatting all package Go files..."
      find packages -name "*.go" -not -path "*/node_modules/*" -exec gofmt -w {} \;
      find packages -name "*.go" -not -path "*/node_modules/*" -exec goimports -w {} \;
scripts:
  'commands/*':
    runner: bash
