version: 2
project_name: devex-plugin-sdk
before:
  hooks:
    - go mod tidy
    - go test ./...
builds:
  - skip: true # This is a library, not an executable
archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_ {{- title .Os }}_ {{- if eq .Arch "amd64" }}x86_64 {{- else if eq .Arch "386" }}i386 {{- else }}{{ .Arch }}{{ end }} {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore'
      - '^ci:'
      - '^refactor:'
      - Merge pull request
      - Merge branch
      - go mod tidy
  groups:
    - title: Features
      regexp: '^.*?(feat|feature)(\(.+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: 'Performance improvements'
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999
release:
  # Visit your project's releases page to view the created release.
  # Defaults to `{{.ProjectName}}/releases/tag/{{.Tag}}` on GitHub.
  # name_template: "{{.ProjectName}}-v{{.Version}} {{.Env.USER}}"

  # Header for the release body.
  header: |
    ## DevEx Plugin SDK v{{ .Version }}

    This release contains the latest version of the DevEx Plugin SDK -
    a comprehensive Go library for building DevEx plugins.

    ### Installation

    ```bash
    go get github.com/jameswlane/devex/packages/plugin-sdk@{{ .Tag }}
    ```
  # Footer for the release body.
  footer: |
    ## Docker Images

    - `ghcr.io/jameswlane/devex/plugin-sdk:{{ .Tag }}`
    - `ghcr.io/jameswlane/devex/plugin-sdk:latest`
  # You can disable this pipe in order to not create the release on any SCM.
  disable: false
  # Set this to true if you want to disable just the artifact upload to the SCM.
  skip_upload: false
  # You can change the name of the release.
  name_template: "Plugin SDK v{{.Version}}"
  # If set to auto, will mark the release as not ready for production
  # in case there is an indicator for this in the tag e.g. v1.0.0-rc1
  # If set to true, will mark the release as not ready for production.
  prerelease: auto
  # What to do with the release notes in case there the release already exists.
  #
  # Valid options are:
  # - `keep-existing`: keep the existing notes
  # - `append`: append the current release notes to the existing notes
  # - `prepend`: prepend the current release notes to the existing notes
  # - `replace`: replace existing notes
  mode: append

